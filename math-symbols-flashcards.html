<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Math Symbols Flashcards</title>
<script>if('serviceWorker' in navigator){/* PWA stub */}</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #000000; --bg1: #0a0a0e; --bg2: #111115; --bg3: #1a1a1f;
  --bg4: #222228; --border: #2a2a30; --text: #d4d4d8; --text2: #a1a1aa;
  --text3: #71717a; --white: #fafafa; --green: #4ade80; --blue: #60a5fa;
  --yellow: #facc15; --red: #f87171; --orange: #fb923c; --purple: #a78bfa;
}
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif;
  height:100vh; height:100dvh; overflow:hidden; display:flex; flex-direction:column; }

/* Header */
.header { padding:12px 16px; background:var(--bg1); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.header h1 { font-size:16px; font-weight:700; color:var(--white); }
.header h1 span { color:var(--green); }
.stats { font-size:12px; color:var(--text3); font-family:'Cascadia Code',monospace; }

/* Views */
.view { display:none; flex:1; flex-direction:column; overflow:hidden; }
.view.active { display:flex; }

/* Dashboard */
.dashboard { padding:20px 16px; overflow-y:auto; }
.stat-row { display:flex; gap:8px; margin-bottom:16px; }
.stat-card { flex:1; background:var(--bg2); border:1px solid var(--border);
  border-radius:8px; padding:12px; text-align:center; }
.stat-card .num { font-size:28px; font-weight:700; font-family:'Cascadia Code',monospace; }
.stat-card .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.start-btn { display:block; width:100%; padding:14px; margin-top:12px; border:none;
  border-radius:8px; font-size:15px; font-weight:700; cursor:pointer;
  background:var(--green); color:#000; }
.start-btn:disabled { background:var(--bg3); color:var(--text3); cursor:default; }

/* Card */
.card-container { flex:1; display:flex; flex-direction:column; padding:12px; }
.progress-bar { height:3px; background:var(--bg3); border-radius:2px; margin-bottom:8px; flex-shrink:0; }
.progress-fill { height:100%; background:var(--green); border-radius:2px; transition:width 0.3s; }
.counter { font-size:12px; color:var(--text3); text-align:center; margin-bottom:8px; flex-shrink:0;
  font-family:'Cascadia Code',monospace; }

.card { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  padding:24px 20px; cursor:pointer; position:relative; min-height:0;
  -webkit-user-select:none; user-select:none; }
.card .category { position:absolute; top:12px; left:16px; font-size:10px;
  color:var(--text3); letter-spacing:1px; text-transform:uppercase; }
.card .symbol { font-size:48px; color:var(--white); text-align:center; }
.card .divider { width:60px; height:1px; background:var(--border); margin:16px 0; }
.card .name { font-size:20px; font-weight:600; color:var(--white); text-align:center; margin-bottom:6px; }
.card .meaning { font-size:14px; color:var(--text2); text-align:center; line-height:1.4; max-width:340px; }
.card .example { font-size:16px; color:var(--purple); text-align:center; margin-top:10px; }
.card .tap-hint { position:absolute; bottom:10px; font-size:11px; color:var(--text3); }

.back-hidden .divider, .back-hidden .name, .back-hidden .meaning, .back-hidden .example { display:none; }
.back-hidden .tap-hint::after { content:'tap to reveal'; }
.back-visible .tap-hint::after { content:'rate below'; }

/* Rating buttons */
.rating-row { display:flex; gap:6px; padding:8px 0; flex-shrink:0; margin-top:8px; }
.rate-btn { flex:1; border:none; border-radius:8px; padding:10px 4px; cursor:pointer;
  font-size:13px; font-weight:600; background:var(--bg3); display:flex;
  flex-direction:column; align-items:center; gap:2px; }
.rate-btn .interval { font-size:10px; font-weight:400; font-family:'Cascadia Code',monospace; opacity:0.6; }
.rate-btn.hard { color:var(--orange); }
.rate-btn.okay { color:var(--yellow); }
.rate-btn.good { color:var(--blue); }
.rate-btn.easy { color:var(--green); }

/* Done */
.done-view { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
.done-view h2 { font-size:22px; color:var(--green); margin-bottom:8px; }
.done-view p { font-size:14px; color:var(--text2); margin-bottom:20px; }

/* Nav */
.nav { display:flex; border-top:1px solid var(--border); background:var(--bg1); flex-shrink:0; }
.nav button { flex:1; border:none; background:none; color:var(--text3); padding:10px;
  font-size:12px; cursor:pointer; font-family:inherit; }
.nav button.active { color:var(--green); }
</style>
</head>
<body>

<div class="header">
  <h1><span>MS</span> Math Symbols</h1>
  <div class="stats" id="hdr-stats"></div>
</div>

<!-- Dashboard -->
<div class="view active" id="v-dash">
  <div class="dashboard">
    <div class="stat-row">
      <div class="stat-card"><div class="num" id="s-due" style="color:var(--green)">0</div><div class="lbl">Due</div></div>
      <div class="stat-card"><div class="num" id="s-learned" style="color:var(--blue)">0</div><div class="lbl">Learned</div></div>
      <div class="stat-card"><div class="num" id="s-total" style="color:var(--text3)">0</div><div class="lbl">Total</div></div>
    </div>
    <button class="start-btn" id="btn-start" onclick="startReview()">Start Review</button>
    <button class="start-btn" id="btn-learn" onclick="learnMore()" style="margin-top:8px;background:var(--blue)">Learn More New Cards</button>
    <div style="margin-top:20px">
      <div style="font-size:13px;font-weight:600;color:var(--white);margin-bottom:8px">Categories</div>
      <div id="cat-list"></div>
      <div style="margin-top:20px;display:flex;gap:6px">
        <button onclick="exportProgress()" style="flex:1;border:none;border-radius:6px;padding:8px;font-size:11px;background:var(--bg3);color:var(--text3);cursor:pointer">Export Progress</button>
        <label style="flex:1;border:none;border-radius:6px;padding:8px;font-size:11px;background:var(--bg3);color:var(--text3);cursor:pointer;text-align:center">
          Import Progress<input type="file" accept=".json" onchange="importProgress(event)" style="display:none">
        </label>
      </div>
    </div>
  </div>
</div>

<!-- Review -->
<div class="view" id="v-review">
  <div class="card-container">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <div class="counter" id="counter"></div>
    <div class="card back-hidden" id="card" onclick="flipCard()">
      <div class="category" id="card-cat"></div>
      <div class="symbol" id="card-symbol"></div>
      <div class="divider"></div>
      <div class="name" id="card-name"></div>
      <div class="meaning" id="card-meaning"></div>
      <div class="example" id="card-example"></div>
      <div class="tap-hint"></div>
    </div>
    <div class="rating-row" id="ratings" style="visibility:hidden">
      <button class="rate-btn again" onclick="again()" style="color:var(--red)">Again<span class="interval">re-queue</span></button>
      <button class="rate-btn hard" onclick="rate(0)">Hard<span class="interval">2d</span></button>
      <button class="rate-btn okay" onclick="rate(1)">Okay<span class="interval">5d</span></button>
      <button class="rate-btn good" onclick="rate(2)">Good<span class="interval">14d</span></button>
      <button class="rate-btn easy" onclick="rate(3)">Easy<span class="interval">30d</span></button>
    </div>
  </div>
</div>

<!-- Done -->
<div class="view" id="v-done">
  <div class="done-view">
    <h2>Session Complete</h2>
    <p id="done-msg"></p>
    <button class="start-btn" id="keep-going-btn" onclick="keepGoing()" style="margin-bottom:10px;background:var(--blue)">Keep Going</button>
    <button class="start-btn" onclick="showView('v-dash');refreshDash()" style="background:var(--bg3);color:var(--text2)">Back to Dashboard</button>
  </div>
</div>

<!-- Manage -->
<div class="view" id="v-manage">
  <div class="dashboard" id="manage-list"></div>
</div>

<!-- Card Detail Modal -->
<div id="detail-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:100;display:none;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:400px;width:100%" id="detail-content"></div>
</div>

<!-- Nav -->
<div class="nav">
  <button class="active" onclick="showView('v-dash');refreshDash()">Dashboard</button>
  <button onclick="resumeOrStartReview()">Review</button>
  <button onclick="showView('v-manage');refreshManage()">Manage</button>
</div>

// ── SM-2 (simplified 4-button version) ──
const INTERVALS = [2, 5, 14, 30]; // Hard, Okay, Good, Easy (first review)
const INTERVALS_2 = [5, 14, 30, 60]; // second review
function sm2(quality, reps, ease, interval) {
  let newInterval;
  if (quality === 0) { // Hard
    if (reps < 2) newInterval = INTERVALS[0];
    else newInterval = Math.max(2, Math.round(interval * 0.5));
    ease = Math.max(1.3, ease - 0.15);
  } else if (quality === 1) { // Okay
    if (reps === 0) newInterval = INTERVALS[1];
    else if (reps === 1) newInterval = INTERVALS_2[1];
    else newInterval = Math.round(interval * ease * 0.8);
    ease = Math.max(1.3, ease - 0.05);
  } else if (quality === 2) { // Good
    if (reps === 0) newInterval = INTERVALS[2];
    else if (reps === 1) newInterval = INTERVALS_2[2];
    else newInterval = Math.round(interval * ease);
  } else { // Easy
    if (reps === 0) newInterval = INTERVALS[3];
    else if (reps === 1) newInterval = INTERVALS_2[3];
    else newInterval = Math.round(interval * ease * 1.3);
    ease = ease + 0.1;
  }
  return { reps: reps + 1, ease: Math.round(Math.max(1.3, ease) * 100) / 100, interval: newInterval };
}

function intervalLabel(d) {
  if (d < 30) return d + 'd';
  if (d < 365) return Math.round(d/30) + 'mo';
  return Math.round(d/365) + 'y';
}

// ── State ──
const STORAGE_KEY = 'math-symbols-sr';
let progress = {};
let queue = [];
let qi = 0;
let sessionCount = 0;
const NEW_PER_DAY = 20;

function loadProgress() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) { try { progress = JSON.parse(stored); return; } catch(e) {} }
  // First load: import from embedded initial data
  if (typeof MS_INITIAL_PROGRESS !== 'undefined' && Object.keys(MS_INITIAL_PROGRESS).length > 0) {
    progress = { ...MS_INITIAL_PROGRESS };
    saveProgress();
    return;
  }
  progress = {};
}
function saveProgress() { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }
function today() { return new Date().toISOString().slice(0, 10); }

function getCardProgress(i) {
  if (!progress[i]) progress[i] = { ease: 2.5, interval: 1, reps: 0, next: '', last: '' };
  return progress[i];
}

function newCardsIntroducedToday() {
  const t = today();
  let count = 0;
  CARDS.forEach((_, i) => {
    const p = getCardProgress(i);
    if (p.reps === 1 && p.last === t) count++; // first review was today
  });
  return count;
}

// ── Dashboard ──
function refreshDash() {
  const t = today();
  let dueReview = 0, newAvail = 0, learned = 0;
  const newToday = newCardsIntroducedToday();
  const newRemaining = Math.max(0, NEW_PER_DAY - newToday);

  CARDS.forEach((_, i) => {
    const p = getCardProgress(i);
    if (p.reps > 0 && p.next && p.next <= t) dueReview++;
    if (p.reps === 0) newAvail++;
    if (p.reps > 0) learned++;
  });

  const newToShow = Math.min(newAvail, newRemaining);
  const totalDue = dueReview + newToShow;

  document.getElementById('s-due').textContent = totalDue;
  document.getElementById('s-due').style.color = totalDue > 0 ? 'var(--green)' : 'var(--text3)';
  document.getElementById('s-learned').textContent = learned;
  document.getElementById('s-total').textContent = CARDS.length;
  document.getElementById('hdr-stats').textContent = dueReview + ' review + ' + newToShow + ' new';
  const btn = document.getElementById('btn-start');
  if (totalDue > 0) {
    btn.textContent = `Start Review (${dueReview} review + ${newToShow} new)`;
    btn.disabled = false;
  } else {
    btn.textContent = 'All caught up!';
    btn.disabled = true;
  }
  // Show "Learn More" if there are unseen cards
  const learnBtn = document.getElementById('btn-learn');
  if (newAvail > 0) {
    learnBtn.style.display = 'block';
    learnBtn.textContent = `Learn More New Cards (${newAvail} unseen)`;
  } else {
    learnBtn.style.display = 'none';
  }

  // Category list
  const cats = {};
  CARDS.forEach((c, i) => {
    if (!cats[c.cat]) cats[c.cat] = { total: 0, learned: 0 };
    cats[c.cat].total++;
    if (getCardProgress(i).reps > 0) cats[c.cat].learned++;
  });
  let html = '';
  for (const [cat, d] of Object.entries(cats)) {
    const pct = d.total > 0 ? Math.round(d.learned / d.total * 100) : 0;
    html += `<div style="display:flex;align-items:center;gap:8px;padding:4px 0">
      <span style="font-size:12px;color:var(--text2);width:90px">${cat}</span>
      <div style="flex:1;height:4px;background:var(--bg3);border-radius:2px">
        <div style="width:${pct}%;height:100%;background:var(--green);border-radius:2px"></div>
      </div>
      <span style="font-size:11px;color:var(--text3);font-family:'Cascadia Code',monospace;width:40px;text-align:right">${d.learned}/${d.total}</span>
    </div>`;
  }
  document.getElementById('cat-list').innerHTML = html;
}

// ── Review ──
let reviewInProgress = false;

function resumeOrStartReview() {
  if (reviewInProgress && qi < queue.length) {
    showView('v-review');  // just switch back, don't reset
    return;
  }
  startReview();
}

function startReview() {
  const t = today();
  const reviewQueue = [];
  const newQueue = [];
  const newToday = newCardsIntroducedToday();
  const newRemaining = Math.max(0, NEW_PER_DAY - newToday);

  CARDS.forEach((_, i) => {
    const p = getCardProgress(i);
    if (p.reps > 0 && p.next && p.next <= t) reviewQueue.push(i);
    else if (p.reps === 0) newQueue.push(i);
  });

  // Shuffle both
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }
  shuffle(reviewQueue);
  shuffle(newQueue);

  // All reviews + capped new cards
  queue = [...reviewQueue, ...newQueue.slice(0, newRemaining)];
  // Shuffle the combined queue so new cards are mixed in
  shuffle(queue);

  qi = 0;
  sessionCount = 0;
  if (queue.length === 0) return;
  reviewInProgress = true;
  showView('v-review');
  showCard();
}

function showCard() {
  if (qi >= queue.length) { reviewInProgress = false; showDone(); return; }
  const card = CARDS[queue[qi]];
  const p = getCardProgress(queue[qi]);
  document.getElementById('counter').textContent = `${qi + 1} / ${queue.length}`;
  document.getElementById('prog').style.width = ((qi + 1) / queue.length * 100) + '%';
  document.getElementById('card-cat').textContent = card.cat;

  const symEl = document.getElementById('card-symbol');
  const nameEl = document.getElementById('card-name');
  const meaningEl = document.getElementById('card-meaning');
  const exEl = document.getElementById('card-example');

  // Render with KaTeX
  try { katex.render(card.s, symEl, { throwOnError: false, displayMode: true }); }
  catch(e) { symEl.textContent = card.s; }

  nameEl.textContent = card.n;
  meaningEl.textContent = card.m;
  if (card.ex) {
    try { katex.render(card.ex, exEl, { throwOnError: false, displayMode: false }); }
    catch(e) { exEl.textContent = card.ex; }
  } else { exEl.textContent = ''; }

  // Hide back
  const cardEl = document.getElementById('card');
  cardEl.classList.add('back-hidden');
  cardEl.classList.remove('back-visible');
  document.getElementById('ratings').style.visibility = 'hidden';

  // Update interval labels on buttons (skip index 0 which is Again's "re-queue")
  const btns = document.querySelectorAll('.rate-btn .interval');
  [0,1,2,3].forEach(q => {
    const r = sm2(q, p.reps, p.ease, p.interval);
    btns[q + 1].textContent = intervalLabel(r.interval);  // +1 to skip Again button
  });
}

function flipCard() {
  const cardEl = document.getElementById('card');
  if (cardEl.classList.contains('back-hidden')) {
    cardEl.classList.remove('back-hidden');
    cardEl.classList.add('back-visible');
    document.getElementById('ratings').style.visibility = 'visible';
  }
}

function rate(quality) {
  const idx = queue[qi];
  const p = getCardProgress(idx);
  const r = sm2(quality, p.reps, p.ease, p.interval);
  const t = today();
  const next = new Date();
  next.setDate(next.getDate() + r.interval);
  p.reps = r.reps;
  p.ease = r.ease;
  p.interval = r.interval;
  p.last = t;
  p.next = next.toISOString().slice(0, 10);
  saveProgress();
  qi++;
  sessionCount++;
  showCard();
}

function showDone() {
  showView('v-done');
  // Count remaining cards available
  const t = today();
  const newToday = newCardsIntroducedToday();
  let extraReview = 0, extraNew = 0;
  CARDS.forEach((_, i) => {
    const p = getCardProgress(i);
    if (p.reps > 0 && p.next && p.next <= t) extraReview++;
    else if (p.reps === 0) extraNew++;
  });
  const total = extraReview + extraNew;
  let msg = `You reviewed ${sessionCount} card${sessionCount !== 1 ? 's' : ''}.`;
  if (total > 0) msg += ` ${extraReview} review + ${extraNew} new remaining.`;
  document.getElementById('done-msg').textContent = msg;
  document.getElementById('keep-going-btn').style.display = total > 0 ? 'block' : 'none';
}

function learnMore() {
  const newQ = [];
  CARDS.forEach((_, i) => {
    const p = getCardProgress(i);
    if (p.reps === 0) newQ.push(i);
  });
  if (newQ.length === 0) return;
  const count = prompt(`How many new cards? (${newQ.length} available)`, '10');
  if (!count || isNaN(count) || +count <= 0) return;
  function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} }
  shuffle(newQ);
  queue = newQ.slice(0, +count);
  qi = 0;
  reviewInProgress = true;
  showView('v-review');
  showCard();
}

function keepGoing() {
  const t = today();
  const reviewQ = [], newQ = [];
  CARDS.forEach((_, i) => {
    const p = getCardProgress(i);
    if (p.reps > 0 && p.next && p.next <= t) reviewQ.push(i);
    else if (p.reps === 0) newQ.push(i);
  });
  function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} }
  shuffle(reviewQ); shuffle(newQ);
  // No cap — give them everything
  queue = [...reviewQ, ...newQ];
  shuffle(queue);
  qi = 0;
  if (queue.length === 0) return;
  showView('v-review');
  showCard();
}

function again() {
  // Put card back 3-5 positions ahead in the queue
  const idx = queue[qi];
  const insertPos = Math.min(qi + 3 + Math.floor(Math.random() * 3), queue.length);
  queue.splice(insertPos, 0, idx);
  qi++;
  showCard();
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach((b, i) => {
    b.classList.toggle('active',
      (id === 'v-dash' && i === 0) || (id === 'v-review' && i === 1) || (id === 'v-manage' && i === 2));
  });
}

// ── Manage view ──
function refreshManage() {
  const t = today();
  const cats = {};
  CARDS.forEach((c, i) => {
    if (!cats[c.cat]) cats[c.cat] = [];
    cats[c.cat].push(i);
  });

  let html = '<div style="font-size:16px;font-weight:700;color:var(--white);margin-bottom:12px">Card Manager</div>';
  html += '<div style="font-size:12px;color:var(--text3);margin-bottom:16px">Tap any card to view details and edit its schedule.</div>';

  for (const [cat, indices] of Object.entries(cats)) {
    html += `<div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;margin:12px 0 6px;text-transform:uppercase">${cat} (${indices.length})</div>`;
    for (const i of indices) {
      const c = CARDS[i];
      const p = getCardProgress(i);
      let badge = '', badgeClr = 'var(--text3)';
      if (p.reps === 0) { badge = 'NEW'; badgeClr = 'var(--purple)'; }
      else if (p.next && p.next <= t) { badge = 'DUE'; badgeClr = 'var(--green)'; }
      else if (p.next) {
        const d = Math.ceil((new Date(p.next) - new Date(t)) / 86400000);
        badge = d + 'd'; badgeClr = 'var(--text3)';
      }
      html += `<div onclick="showDetail(${i})" style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:3px;cursor:pointer">
        <span style="font-size:13px;min-width:30px;text-align:center" id="sym-${i}"></span>
        <span style="flex:1;font-size:12px;color:var(--text)">${c.n}</span>
        <span style="font-size:10px;font-family:'Cascadia Code',monospace;color:${badgeClr}">${badge}</span>
        <span style="font-size:10px;font-family:'Cascadia Code',monospace;color:var(--text3)">${p.reps > 0 ? 'iv:' + p.interval + 'd' : ''}</span>
      </div>`;
    }
  }
  document.getElementById('manage-list').innerHTML = html;

  // Render symbols with KaTeX
  CARDS.forEach((c, i) => {
    const el = document.getElementById('sym-' + i);
    if (el) try { katex.render(c.s, el, { throwOnError: false }); } catch(e) {}
  });
}

function showDetail(i) {
  const c = CARDS[i];
  const p = getCardProgress(i);
  const t = today();

  let status = 'New', statusClr = 'var(--purple)';
  if (p.reps > 0 && p.next && p.next <= t) { status = 'Due'; statusClr = 'var(--green)'; }
  else if (p.reps > 0 && p.next) {
    const d = Math.ceil((new Date(p.next) - new Date(t)) / 86400000);
    status = 'Due in ' + d + ' day' + (d !== 1 ? 's' : ''); statusClr = 'var(--text2)';
  }

  let html = `<div style="text-align:center;margin-bottom:12px">
    <div style="font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase">${c.cat}</div>
    <div style="font-size:32px;color:var(--white);margin:8px 0" id="detail-sym"></div>
    <div style="font-size:16px;font-weight:600;color:var(--white)">${c.n}</div>
    <div style="font-size:12px;color:var(--text2);margin-top:4px">${c.m}</div>
  </div>`;

  html += `<div style="background:var(--bg3);border-radius:6px;padding:10px;margin:12px 0;font-size:12px">`;
  const rows = [
    ['Status', status, statusClr],
    ['Interval', p.interval + ' day' + (p.interval !== 1 ? 's' : ''), 'var(--text)'],
    ['Reps', '' + p.reps, 'var(--text)'],
    ['Ease', p.ease.toFixed(2), 'var(--text)'],
    ['Last review', p.last || 'Never', 'var(--text3)'],
    ['Next review', p.next || 'Not set', 'var(--text3)'],
  ];
  for (const [lbl, val, clr] of rows) {
    html += `<div style="display:flex;justify-content:space-between;padding:2px 0">
      <span style="color:var(--text3)">${lbl}</span>
      <span style="color:${clr};font-family:'Cascadia Code',monospace">${val}</span>
    </div>`;
  }
  html += '</div>';

  html += '<div style="font-size:10px;color:var(--text3);letter-spacing:1px;margin-bottom:6px">SET INTERVAL</div>';
  html += '<div style="display:flex;gap:4px;flex-wrap:wrap">';
  for (const [d, lbl, clr] of [[0,'Now','var(--red)'],[2,'2d','var(--orange)'],[5,'5d','var(--yellow)'],[14,'14d','var(--blue)'],[30,'30d','var(--green)']]) {
    html += `<button onclick="setCardInterval(${i},${d})" style="flex:1;border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:600;background:var(--bg4);color:${clr};cursor:pointer">${lbl}</button>`;
  }
  html += '</div>';

  html += `<div style="display:flex;gap:6px;margin-top:10px">
    <button onclick="resetCard(${i})" style="flex:1;border:none;border-radius:6px;padding:8px;font-size:11px;background:var(--bg4);color:var(--red);cursor:pointer">Reset to New</button>
    <button onclick="closeDetail()" style="flex:1;border:none;border-radius:6px;padding:8px;font-size:11px;background:var(--bg4);color:var(--text2);cursor:pointer">Close</button>
  </div>`;

  const modal = document.getElementById('detail-modal');
  document.getElementById('detail-content').innerHTML = html;
  modal.style.display = 'flex';

  const symEl = document.getElementById('detail-sym');
  try { katex.render(c.s, symEl, { throwOnError: false, displayMode: true }); } catch(e) {}
}

function setCardInterval(i, days) {
  const p = getCardProgress(i);
  const t = today();
  const next = new Date();
  next.setDate(next.getDate() + days);
  p.interval = days;
  p.next = days === 0 ? t : next.toISOString().slice(0, 10);
  p.last = t;
  if (p.reps === 0) p.reps = 1;
  saveProgress();
  closeDetail();
  refreshManage();
}

function resetCard(i) {
  progress[i] = { ease: 2.5, interval: 1, reps: 0, next: '', last: '' };
  saveProgress();
  closeDetail();
  refreshManage();
}

function closeDetail() {
  document.getElementById('detail-modal').style.display = 'none';
}

// ── Init ──
function exportProgress() {
  const blob = new Blob([JSON.stringify(progress, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ms-progress.json';
  a.click();
}

function importProgress(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      progress = JSON.parse(e.target.result);
      saveProgress();
      refreshDash();
      alert('Progress imported!');
    } catch(err) { alert('Invalid JSON file'); }
  };
  reader.readAsText(file);
}

loadProgress();
refreshDash();
</script>
</body>
</html>
