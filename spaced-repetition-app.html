<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09090b">
<title>Spaced Repetition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#09090b;--bg1:#111114;--bg2:#18181b;--bg3:#1e1e23;--bg4:#27272a;
  --border:#27272a;--border-h:#3f3f46;
  --text:#d4d4d8;--text2:#a1a1aa;--text3:#71717a;--white:#fafafa;
  --green:#4ade80;--green-d:#166534;--purple:#a78bfa;--pink:#f472b6;
  --yellow:#facc15;--blue:#60a5fa;--orange:#fb923c;--red:#f87171;--red-d:#7f1d1d;--cyan:#22d3ee;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}

/* Nav bar */
.nav{display:flex;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 8px}
.nav button{flex:1;border:none;background:none;color:var(--text3);padding:14px 8px;font-size:13px;font-weight:600}
.nav button.active{color:var(--green);border-bottom:2px solid var(--green)}

/* Header */
.hdr{padding:10px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr h1{font-size:16px;font-weight:700;color:var(--white)}
.hdr h1 span{color:var(--green);font-family:'Cascadia Code',monospace}
.hdr-right{font-size:12px;color:var(--text3);font-family:'Cascadia Code',monospace}

/* Views */
.view{display:none;flex:1;overflow:hidden;flex-direction:column}
.view.active{display:flex}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Dashboard */
.dash{padding:20px}
.stat-row{display:flex;gap:8px;margin-bottom:16px}
.stat-card{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;font-family:'Cascadia Code',monospace}
.stat-card .lbl{font-size:11px;color:var(--text3);margin-top:2px}
.start-btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:700;background:var(--green);color:#000}
.start-btn:disabled{background:var(--bg3);color:var(--text3);cursor:default}
.sec-item{display:flex;align-items:center;gap:10px;padding:8px 0}
.sec-item .bar{flex:1;height:5px;background:var(--bg3);border-radius:3px}
.sec-item .fill{height:100%;border-radius:3px;transition:width .3s}

/* Manage */
.manage-panel{display:flex;flex-direction:column;height:100%}
.sec-list{width:100%;border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;flex-shrink:0;padding:8px 12px;display:flex;gap:6px}
.sec-chip{display:inline-block;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;
  background:var(--bg2);color:var(--text3);border:1px solid var(--border);cursor:pointer;white-space:nowrap}
.sec-chip.active{color:var(--green);border-color:var(--green)}
.topic-list{flex:1;overflow-y:auto;padding:8px 12px}
.topic-row{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:4px}
.topic-top{display:flex;align-items:center;gap:8px}
.topic-id{font-family:'Cascadia Code',monospace;font-size:11px;font-weight:700;padding:2px 6px;background:var(--bg3);border-radius:4px}
.topic-text{font-size:12px;color:var(--text);margin-top:4px}
.badge{font-family:'Cascadia Code',monospace;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg3)}
.topic-actions{display:flex;gap:4px;margin-top:6px}
.topic-actions button{border:none;font-size:11px;padding:4px 10px;border-radius:4px;background:var(--bg3);color:var(--text3)}

/* Toggle */
.toggle{width:36px;height:20px;border-radius:10px;background:var(--bg4);cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle .knob{width:16px;height:16px;border-radius:50%;background:var(--white);position:absolute;top:2px;left:2px;transition:left .2s}
.toggle.on .knob{left:18px}

/* Card review */
.card-wrap{flex:1;display:flex;flex-direction:column;padding:12px;max-width:800px;margin:0 auto;width:100%}
.prog-bar{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:6px;flex-shrink:0}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.counter{font-size:12px;color:var(--text3);text-align:center;margin-bottom:8px;font-family:'Cascadia Code',monospace;flex-shrink:0}
.card{flex:1;display:flex;flex-direction:column;background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:28px 24px;position:relative;min-height:0;overflow-y:auto}
.card .sec-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.card .card-id{font-family:'Cascadia Code',monospace;font-size:14px;font-weight:700;margin-bottom:4px}
.card .card-meta{font-family:'Cascadia Code',monospace;font-size:10px;color:var(--text3);margin-bottom:16px}
.card .card-text{font-size:18px;color:var(--white);line-height:1.4;flex:1}
.card .card-hint{font-size:11px;color:var(--text3);margin-top:16px;text-align:center}
.rate-row{display:flex;gap:6px;padding:8px 0;flex-shrink:0;margin-top:8px}
.rate-btn{flex:1;border:none;border-radius:8px;padding:12px 4px;font-size:13px;font-weight:600;
  background:var(--bg3);display:flex;flex-direction:column;align-items:center;gap:2px}
.rate-btn .iv{font-size:10px;font-weight:400;font-family:'Cascadia Code',monospace;opacity:.6}

/* Copy prompt area */
.copy-area{margin-top:12px;display:flex;gap:6px}
.copy-area button{border:none;font-size:11px;padding:6px 14px;border-radius:6px;background:var(--bg3);color:var(--text3)}

/* Detail modal */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;color:var(--white);margin-bottom:4px}
.modal .subtitle{font-size:12px;color:var(--text2);margin-bottom:12px}
.modal .stat-grid{background:var(--bg3);border-radius:6px;padding:10px;margin:10px 0;font-size:12px}
.modal .stat-row-m{display:flex;justify-content:space-between;padding:2px 0}
.modal .stat-row-m .k{color:var(--text3)}
.modal .stat-row-m .v{font-family:'Cascadia Code',monospace}
.modal .interval-btns{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0}
.modal .interval-btns button{flex:1;border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:600;background:var(--bg4);cursor:pointer}
.modal .bottom-btns{display:flex;gap:6px;margin-top:10px}
.modal .bottom-btns button{flex:1;border:none;border-radius:6px;padding:8px;font-size:11px;background:var(--bg4);cursor:pointer}

/* Done */
.done{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.done h2{font-size:22px;color:var(--green);margin-bottom:8px}
.done p{font-size:14px;color:var(--text2);margin-bottom:20px}

/* Responsive */
@media(min-width:700px){.dash,.topic-list{max-width:900px;margin:0 auto;width:100%}}
</style>
</head>
<body>

<div class="hdr">
  <h1><span>SR</span> Spaced Repetition</h1>
  <div class="hdr-right" id="hdr-stats"></div>
</div>

<div class="nav">
  <button class="active" data-v="v-dash" onclick="go('v-dash')">Dashboard</button>
  <button data-v="v-review" onclick="resumeOrStartReview()">Review</button>
  <button data-v="v-manage" onclick="go('v-manage')">Manage</button>
</div>

<!-- Dashboard -->
<div class="view active" id="v-dash"><div class="scroll"><div class="dash">
  <div class="stat-row">
    <div class="stat-card"><div class="num" id="s-due" style="color:var(--green)">0</div><div class="lbl">Due Today</div></div>
    <div class="stat-card"><div class="num" id="s-active" style="color:var(--blue)">0</div><div class="lbl">Active</div></div>
    <div class="stat-card"><div class="num" id="s-total" style="color:var(--text3)">0</div><div class="lbl">Total</div></div>
  </div>
  <button class="start-btn" id="btn-start" onclick="startReview()">Start Review</button>
  <div style="margin-top:20px;font-size:13px;font-weight:600;color:var(--white);margin-bottom:10px">Progress by Section</div>
  <div id="sec-progress"></div>
</div></div></div>

<!-- Manage -->
<div class="view" id="v-manage"><div class="manage-panel">
  <div class="sec-list" id="sec-chips"></div>
  <div class="topic-list" id="topic-list"></div>
</div></div>

<!-- Review -->
<div class="view" id="v-review"><div class="card-wrap">
  <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
  <div class="counter" id="counter"></div>
  <div class="card" id="card">
    <div class="sec-label" id="c-sec"></div>
    <div class="card-id" id="c-id"></div>
    <div class="card-meta" id="c-meta"></div>
    <div class="card-text" id="c-text"></div>
    <div class="copy-area" id="c-copy"></div>
    <div class="card-hint">Rate your recall below</div>
  </div>
  <div class="rate-row" id="rate-row">
    <button class="rate-btn" style="color:var(--red)" onclick="doAgain()">Again<span class="iv">re-queue</span></button>
    <button class="rate-btn" style="color:var(--orange)" onclick="doRate('hard')">Hard<span class="iv" id="iv-hard">2d</span></button>
    <button class="rate-btn" style="color:var(--yellow)" onclick="doRate('okay')">Okay<span class="iv" id="iv-okay">5d</span></button>
    <button class="rate-btn" style="color:var(--blue)" onclick="doRate('good')">Good<span class="iv" id="iv-good">14d</span></button>
    <button class="rate-btn" style="color:var(--green)" onclick="doRate('easy')">Easy<span class="iv" id="iv-easy">30d</span></button>
  </div>
</div></div>

<!-- Done -->
<div class="view" id="v-done"><div class="done">
  <h2>Session Complete</h2>
  <p id="done-msg"></p>
  <button class="start-btn" id="sr-keep-going" onclick="keepGoing()" style="max-width:300px;margin-bottom:10px;background:var(--blue)">Keep Going</button>
  <button class="start-btn" onclick="go('v-dash')" style="max-width:300px;background:var(--bg3);color:var(--text2)">Back to Dashboard</button>
</div></div>

<!-- Detail Modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script src="sr-data.js"></script>
<script>
// ── Globals ──
const STORAGE_KEY = 'sr-progress-v2';
const DAILY_CAP = 4;
let progress = {};
let queue = [], qi = 0, sessionTotal = 0;
let curSecIdx = 0;

// ── Helpers ──
function today() { return new Date().toISOString().slice(0, 10); }
function ivLabel(d) { return d < 30 ? d+'d' : d < 365 ? Math.round(d/30)+'mo' : Math.round(d/365)+'y'; }
function accent(pk) { return PHASE_ACCENT[pk] || '#71717a'; }

// ── Progress ──
function loadProgress() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) { progress = JSON.parse(stored); return; }
  if (typeof INITIAL_PROGRESS !== 'undefined' && INITIAL_PROGRESS.active) {
    progress = { active: { ...INITIAL_PROGRESS.active } };
    saveProgress();
    return;
  }
  progress = { active: {} };
}
function saveProgress() { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }
function getP(tid) {
  const a = progress.active || {};
  return a[tid] || null;
}
function ensureActive(tid) {
  if (!progress.active) progress.active = {};
  if (!progress.active[tid]) progress.active[tid] = {ease:2.5,interval:1,repetitions:0,next_review:'',last_review:''};
  return progress.active[tid];
}

// All topics flat
const ALL_TOPICS = [];
SECTIONS.forEach(sec => sec.topics.forEach(t => { t.section = sec.name; ALL_TOPICS.push(t); }));

// ── SM-2 ──
const FIRST_IV = {hard:2, okay:5, good:14, easy:30};
const SECOND_IV = {hard:5, okay:14, good:30, easy:60};
function computeInterval(rating, reps, ease, iv) {
  let newIv, newEase = ease;
  if (reps === 0) newIv = FIRST_IV[rating];
  else if (reps === 1) newIv = SECOND_IV[rating];
  else {
    const mult = {hard:0.5, okay:0.8, good:1.0, easy:1.3}[rating];
    newIv = Math.max(2, Math.round(iv * ease * mult));
  }
  if (rating === 'hard') newEase = Math.max(1.3, ease - 0.15);
  else if (rating === 'okay') newEase = Math.max(1.3, ease - 0.05);
  else if (rating === 'easy') newEase = ease + 0.1;
  return { interval: newIv, ease: Math.round(newEase * 100) / 100, reps: reps + 1 };
}

// ── Navigation ──
function go(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.v === viewId));
  if (viewId === 'v-dash') refreshDash();
  if (viewId === 'v-manage') refreshManage();
}

// ── Dashboard ──
function refreshDash() {
  const t = today(), active = progress.active || {};
  let due = 0, actCount = Object.keys(active).length;
  for (const [tid, d] of Object.entries(active)) {
    const nr = d.next_review || '';
    if (nr && nr <= t) due++;
    else if (!nr && d.repetitions === 0) due++;
  }
  document.getElementById('s-due').textContent = due;
  document.getElementById('s-due').style.color = due > 0 ? 'var(--green)' : 'var(--text3)';
  document.getElementById('s-active').textContent = actCount;
  document.getElementById('s-total').textContent = ALL_TOPICS.length;
  document.getElementById('hdr-stats').textContent = due + ' due';
  const btn = document.getElementById('btn-start');
  const cap = Math.min(due, DAILY_CAP);
  btn.textContent = due > 0 ? `Start Review (${cap} cards)` : 'All caught up!';
  btn.disabled = due === 0;

  // Section progress
  let html = '';
  SECTIONS.forEach(sec => {
    const total = sec.topics.length;
    const act = sec.topics.filter(t => active[t.id]).length;
    const clr = accent(sec.topics[0]?.pk || '0B');
    const short = sec.name.replace('Phase ', '').replace(/\s*\(Lesson.+/, '');
    html += `<div class="sec-item">
      <span style="font-size:11px;color:var(--text2);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${short}</span>
      <div class="bar"><div class="fill" style="width:${total>0?act/total*100:0}%;background:${clr}"></div></div>
      <span style="font-size:10px;color:var(--text3);font-family:'Cascadia Code',monospace;width:45px;text-align:right;flex-shrink:0">${act}/${total}</span>
    </div>`;
  });
  document.getElementById('sec-progress').innerHTML = html;
}

// ── Manage ──
function refreshManage() {
  // Section chips
  let chips = '';
  SECTIONS.forEach((sec, i) => {
    const short = sec.name.replace('Phase ', '').replace(/\s*\(Lesson.+/, '');
    chips += `<div class="sec-chip${i===curSecIdx?' active':''}" onclick="curSecIdx=${i};refreshManage()">${short}</div>`;
  });
  document.getElementById('sec-chips').innerHTML = chips;

  // Topic list
  const sec = SECTIONS[curSecIdx];
  const active = progress.active || {};
  const t = today();
  let html = '';
  sec.topics.forEach(topic => {
    const p = active[topic.id];
    const isOn = !!p;
    const clr = accent(topic.pk);
    let badge = '', badgeClr = 'var(--text3)';
    if (isOn) {
      const nr = p.next_review || '';
      const reps = p.repetitions || 0;
      if (reps === 0 && !nr) { badge = 'NEW'; badgeClr = 'var(--cyan)'; }
      else if (nr && nr <= t) { badge = 'DUE'; badgeClr = 'var(--green)'; }
      else if (nr) { badge = ivLabel(p.interval || 1); badgeClr = 'var(--text3)'; }
    }

    html += `<div class="topic-row">
      <div class="topic-top">
        <div class="toggle${isOn?' on':''}" onclick="toggleTopic('${topic.id}',${!isOn})"><div class="knob"></div></div>
        <span class="topic-id" style="color:${clr}">${topic.id}</span>
        <span style="flex:1"></span>
        ${badge ? `<span class="badge" style="color:${badgeClr}">${badge}</span>` : ''}
        ${isOn ? `<span class="badge" style="color:var(--text3)">iv:${p.interval||1}d r:${p.repetitions||0} e:${(p.ease||2.5).toFixed(1)}</span>` : ''}
      </div>
      <div class="topic-text">${topic.text}</div>
      <div class="topic-actions">
        ${isOn ? `<button onclick="showDetail('${topic.id}')" style="color:var(--blue)">Details</button>` : ''}
        <button onclick="copyText('${topic.text.replace(/'/g, "\\'")}')">Copy</button>
      </div>
    </div>`;
  });
  document.getElementById('topic-list').innerHTML = html;
}

function toggleTopic(tid, on) {
  if (!progress.active) progress.active = {};
  if (on) {
    const days = Math.floor(Math.random() * 14) + 1;
    const nr = new Date(); nr.setDate(nr.getDate() + days);
    progress.active[tid] = {ease:2.5,interval:1,repetitions:0,next_review:nr.toISOString().slice(0,10),last_review:''};
  } else {
    delete progress.active[tid];
  }
  saveProgress();
  refreshManage();
}

function copyText(txt) {
  navigator.clipboard.writeText(txt).catch(() => {});
}

// ── Detail Modal ──
function showDetail(tid) {
  const active = progress.active || {};
  const p = active[tid];
  if (!p) return;
  const topic = ALL_TOPICS.find(t => t.id === tid);
  if (!topic) return;
  const t = today();
  const nr = p.next_review || '';
  const reps = p.repetitions || 0;

  let status = 'New (never reviewed)', statusClr = 'var(--cyan)';
  if (reps > 0 && nr && nr <= t) { status = `Due (was due ${nr})`; statusClr = 'var(--green)'; }
  else if (reps > 0 && nr) {
    const d = Math.ceil((new Date(nr) - new Date(t)) / 86400000);
    status = `Upcoming — due in ${d} day${d!==1?'s':''}`;  statusClr = 'var(--text2)';
  }

  let html = `<h3 style="color:${accent(topic.pk)}">${tid}</h3>
    <div class="subtitle">${topic.text}</div>
    <div class="stat-grid">
      ${[['Status', status, statusClr],
         ['Interval', (p.interval||1) + ' days', 'var(--text)'],
         ['Repetitions', ''+(reps), 'var(--text)'],
         ['Ease', (p.ease||2.5).toFixed(2), 'var(--text)'],
         ['Last review', p.last_review || 'Never', 'var(--text3)'],
         ['Next review', nr || 'Not scheduled', 'var(--text3)']
        ].map(([k,v,c]) => `<div class="stat-row-m"><span class="k">${k}</span><span class="v" style="color:${c}">${v}</span></div>`).join('')}
    </div>
    <div style="font-size:10px;color:var(--text3);letter-spacing:1px;margin-bottom:4px">SET INTERVAL</div>
    <div class="interval-btns">
      ${[[0,'Now','var(--red)'],[2,'2d','var(--orange)'],[5,'5d','var(--yellow)'],[14,'14d','var(--blue)'],[30,'30d','var(--green)']].map(([d,l,c]) =>
        `<button style="color:${c}" onclick="setInterval_('${tid}',${d})">${l}</button>`).join('')}
    </div>
    <div style="display:flex;gap:6px;align-items:center;margin:8px 0">
      <span style="font-size:12px;color:var(--text3)">Custom:</span>
      <input id="custom-iv" type="number" min="1" max="365" style="width:60px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg3);color:var(--text);font-family:'Cascadia Code',monospace;font-size:12px">
      <button onclick="const v=document.getElementById('custom-iv').value;if(v>0)setInterval_('${tid}',+v)" style="border:none;padding:4px 12px;border-radius:4px;background:var(--bg4);color:var(--blue);font-size:12px;cursor:pointer">Set</button>
    </div>
    <div class="bottom-btns">
      <button style="color:var(--red)" onclick="resetCard('${tid}')">Reset to New</button>
      <button style="color:var(--text2)" onclick="closeModal()">Close</button>
    </div>`;

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function setInterval_(tid, days) {
  const p = progress.active[tid];
  if (!p) return;
  const t = today();
  const nxt = new Date(); nxt.setDate(nxt.getDate() + days);
  p.interval = days;
  p.next_review = days === 0 ? t : nxt.toISOString().slice(0, 10);
  p.last_review = t;
  if (p.repetitions === 0) p.repetitions = 1;
  saveProgress();
  closeModal();
  refreshManage();
}

function resetCard(tid) {
  if (progress.active[tid]) {
    progress.active[tid] = {ease:2.5,interval:1,repetitions:0,next_review:'',last_review:''};
    saveProgress();
  }
  closeModal();
  refreshManage();
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ── Review ──
let reviewInProgress = false;

function resumeOrStartReview() {
  if (reviewInProgress && qi < queue.length) {
    go('v-review');  // just switch back, don't reset
    return;
  }
  startReview();
}

function startReview() {
  const t = today(), active = progress.active || {};
  const dueQ = [], newQ = [];
  for (const [tid, d] of Object.entries(active)) {
    const nr = d.next_review || '';
    if (nr && nr <= t) dueQ.push(tid);
    else if (!nr && (d.repetitions || 0) === 0) newQ.push(tid);
  }
  // Shuffle
  function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} }
  shuffle(dueQ); shuffle(newQ);
  queue = [...dueQ, ...newQ].slice(0, DAILY_CAP);
  shuffle(queue);
  qi = 0; sessionTotal = 0;
  if (queue.length === 0) { go('v-dash'); return; }
  reviewInProgress = true;
  go('v-review');
  showCard();
}

function showCard() {
  if (qi >= queue.length) { reviewInProgress = false; showDone(); return; }
  const tid = queue[qi];
  const topic = ALL_TOPICS.find(t => t.id === tid);
  const p = progress.active[tid];
  if (!topic || !p) { qi++; showCard(); return; }

  const total = queue.length, cur = qi + 1;
  document.getElementById('counter').textContent = `${cur} / ${total}  (${total - cur} remaining)`;
  document.getElementById('prog').style.width = (cur / total * 100) + '%';

  const short = topic.section.replace('Phase ', '').replace(/\s*\(Lesson.+/, '');
  document.getElementById('c-sec').textContent = short;
  document.getElementById('c-id').style.color = accent(topic.pk);
  document.getElementById('c-id').textContent = tid;
  document.getElementById('c-meta').textContent = `interval ${p.interval||1}d  reps ${p.repetitions||0}  ease ${(p.ease||2.5).toFixed(2)}`;
  document.getElementById('c-text').textContent = topic.text;

  // Copy prompt button
  document.getElementById('c-copy').innerHTML = `<button onclick="copyPrompt('${short.replace(/'/g,"\\'")}','${topic.text.replace(/'/g,"\\'")}')" style="color:var(--purple)">Copy Prompt</button>`;

  // Update interval previews
  const reps = p.repetitions || 0, ease = p.ease || 2.5, iv = p.interval || 1;
  ['hard','okay','good','easy'].forEach(r => {
    const res = computeInterval(r, reps, ease, iv);
    document.getElementById('iv-' + r).textContent = ivLabel(res.interval);
  });
}

function copyPrompt(sec, txt) {
  const prompt = `Give me exactly 4 practice questions on the following topic that take about 5 minutes total to complete. Mix conceptual and computational. Keep questions short and focused.\n\nIMPORTANT: If the section is NOT 'Machine Learning' or 'Interpretability', do NOT use neural networks, transformers, or ML concepts in the questions. The student hasn't learned those yet. Use physics, engineering, or pure math applications instead.\n\nSection: ${sec}\nTopic: ${txt}`;
  navigator.clipboard.writeText(prompt).catch(() => {});
}

function doRate(rating) {
  const tid = queue[qi];
  const p = progress.active[tid];
  const res = computeInterval(rating, p.repetitions||0, p.ease||2.5, p.interval||1);
  const t = today();
  const nxt = new Date(); nxt.setDate(nxt.getDate() + res.interval);
  p.repetitions = res.reps;
  p.ease = res.ease;
  p.interval = res.interval;
  p.last_review = t;
  p.next_review = nxt.toISOString().slice(0, 10);
  saveProgress();
  qi++; sessionTotal++;
  showCard();
}

function doAgain() {
  const tid = queue[qi];
  const insertPos = Math.min(qi + 3 + Math.floor(Math.random() * 3), queue.length);
  queue.splice(insertPos, 0, tid);
  qi++;
  showCard();
}

function showDone() {
  go('v-done');
  const t = today(), active = progress.active || {};
  let extraDue = 0;
  for (const [tid, d] of Object.entries(active)) {
    const nr = d.next_review || '';
    if (nr && nr <= t) extraDue++;
    else if (!nr && (d.repetitions || 0) === 0) extraDue++;
  }
  let msg = `You reviewed ${sessionTotal} card${sessionTotal !== 1 ? 's' : ''}.`;
  if (extraDue > 0) msg += ` ${extraDue} more available.`;
  document.getElementById('done-msg').textContent = msg;
  document.getElementById('sr-keep-going').style.display = extraDue > 0 ? 'block' : 'none';
}

function keepGoing() {
  const t = today(), active = progress.active || {};
  const dueQ = [], newQ = [];
  for (const [tid, d] of Object.entries(active)) {
    const nr = d.next_review || '';
    if (nr && nr <= t) dueQ.push(tid);
    else if (!nr && (d.repetitions || 0) === 0) newQ.push(tid);
  }
  function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} }
  const total = dueQ.length + newQ.length;
  if (total === 0) return;
  const count = prompt(`How many more cards? (${dueQ.length} review + ${newQ.length} new available)`, String(Math.min(total, DAILY_CAP)));
  if (!count || isNaN(count) || +count <= 0) return;
  shuffle(dueQ); shuffle(newQ);
  queue = [...dueQ, ...newQ];
  shuffle(queue);
  queue = queue.slice(0, +count);
  qi = 0;
  if (queue.length === 0) return;
  reviewInProgress = true;
  go('v-review');
  showCard();
}

// ── Export/Import ──
function exportProgress() {
  const blob = new Blob([JSON.stringify(progress, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sr-progress.json';
  a.click();
}

// ── Init ──
loadProgress();
refreshDash();
</script>
