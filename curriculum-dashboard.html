<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Path to AI Alignment — Curriculum Navigator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg-raised: #12121a;
    --bg-panel: #16161f;
    --bg-hover: #1e1e2a;
    --border: #2a2a3a;
    --border-bright: #3a3a5a;
    --text: #e0e0ec;
    --text-dim: #8888a0;
    --text-bright: #ffffff;
    --accent-1: #6ee7b7;
    --accent-2: #818cf8;
    --accent-3: #f9a8d4;
    --accent-4: #fbbf24;
    --accent-5: #38bdf8;
    --accent-6: #c084fc;
    --accent-7: #fb923c;
    --complete: #34d399;
    --in-progress: #fbbf24;
    --not-started: #4a4a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr 380px;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  /* Header */
  .header {
    grid-column: 1 / -1;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-raised);
  }
  .header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text-bright);
  }
  .header h1 span { color: var(--accent-1); }
  .header-stats {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .header-stats .stat-value {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    font-weight: 600;
  }
  .progress-bar-container {
    width: 180px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-5));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Sidebar */
  .sidebar {
    background: var(--bg-raised);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .nav-section-header {
    padding: 10px 16px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }
  .nav-section-header:hover { background: var(--bg-hover); }
  .nav-section-header .chevron {
    transition: transform 0.2s;
    font-size: 8px;
  }
  .nav-section-header .chevron.collapsed { transform: rotate(-90deg); }

  .nav-item {
    padding: 6px 16px 6px 24px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    transition: all 0.15s;
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text); }
  .nav-item.active { background: var(--bg-hover); color: var(--text-bright); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .status-dot:hover { transform: scale(1.4); }

  .nav-item-checkpoint {
    padding: 5px 16px 5px 32px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    font-style: italic;
    opacity: 0.7;
  }
  .nav-item-checkpoint:hover { opacity: 1; background: var(--bg-hover); }

  /* Main Canvas */
  .main-canvas {
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }
  .canvas-controls {
    position: absolute;
    top: 8px;
    left: 8px;
    z-index: 10;
    display: flex;
    gap: 2px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px;
  }
  .canvas-btn {
    padding: 3px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    background: transparent;
    color: var(--text-dim);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .canvas-btn:hover { color: var(--text); background: var(--bg-hover); }
  .canvas-btn.active { color: var(--text-bright); background: var(--bg-hover); }
  .sync-btn {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    padding: 4px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  .sync-btn:hover { color: var(--complete); border-color: var(--complete); }
  .sync-btn.syncing { opacity: 0.5; pointer-events: none; }
  .sync-btn.success { color: var(--complete); border-color: var(--complete); }
  .sync-btn.error { color: #f87171; border-color: #f87171; }

  .canvas-legend {
    position: absolute;
    bottom: 12px;
    left: 12px;
    display: flex;
    gap: 14px;
    font-size: 11px;
    color: var(--text-dim);
    z-index: 10;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  svg.graph { width: 100%; height: 100%; }

  .edge {
    stroke: var(--border);
    stroke-width: 1.2;
    opacity: 0.4;
    transition: all 0.3s;
  }
  .edge.highlighted { stroke: var(--accent-5); opacity: 0.9; stroke-width: 2; }
  .edge-cross-phase {
    stroke-dasharray: 6 4;
    opacity: 0.2;
  }
  .edge-cross-phase.highlighted { opacity: 0.6; stroke: var(--accent-6); }

  .node-group { cursor: pointer; }
  .node-circle {
    stroke-width: 2;
    transition: all 0.2s;
  }
  .node-group:hover .node-circle { stroke-width: 3; filter: brightness(1.3); }
  .node-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-anchor: middle;
    pointer-events: none;
  }

  /* Detail Panel */
  .detail-panel {
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
  }
  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .detail-empty {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 20px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }

  .detail-header { margin-bottom: 16px; }
  .detail-phase-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .detail-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-bright);
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .detail-meta {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .detail-section {
    margin-bottom: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .detail-section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .detail-section-title .icon { font-size: 13px; }

  .prereq-list, .concept-check-list, .failure-list, .project-list {
    list-style: none;
    padding: 0;
  }
  .prereq-list li, .concept-check-list li, .failure-list li {
    font-size: 12px;
    padding: 4px 0;
    line-height: 1.5;
    color: var(--text);
  }
  .concept-check-list li::before { content: "□ "; color: var(--accent-5); font-weight: bold; }
  .failure-list li::before { content: "⚠ "; }

  .prereq-link {
    color: var(--accent-5);
    cursor: pointer;
    font-weight: 500;
    border-bottom: 1px dashed var(--accent-5);
  }
  .prereq-link:hover { color: var(--text-bright); }

  .mvl-resource {
    font-size: 12px;
    padding: 6px 0;
    line-height: 1.5;
  }
  .res-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    color: var(--accent-4);
    display: inline;
    margin-right: 6px;
  }

  .project-item {
    font-size: 12px;
    padding: 4px 0;
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .project-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .project-badge.new { background: rgba(56,189,248,0.15); color: var(--accent-5); }
  .project-badge.extends { background: rgba(192,132,252,0.15); color: var(--accent-6); }

  .mobile-close-btn {
    display: none;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    margin-bottom: 12px;
    width: 100%;
  }
  .mobile-close-btn:hover { color: var(--text); background: var(--bg-hover); }

  .detail-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
  }
  .detail-backdrop.open { display: block; }

  /* Responsive */
  @media (max-width: 1100px) {
    .app { grid-template-columns: 240px 1fr 320px; }
  }

  @media (max-width: 900px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }
    .sidebar { display: none; }
    .header h1 { font-size: 15px; }
    .header-stats { gap: 8px; font-size: 10px; }
    .header { padding: 8px 12px; flex-wrap: wrap; gap: 4px; }
    .progress-bar-container { width: 120px; }
    .main-canvas { overflow: hidden; position: relative; }
    /* Hide SVG on mobile — we use HTML views instead */
    svg.graph { display: none; }
    .canvas-legend { display: none !important; }
    .canvas-controls {
      position: relative;
      top: 0; left: 0;
      margin: 8px;
      width: calc(100% - 16px);
      justify-content: center;
      z-index: 10;
    }
    .canvas-controls .canvas-btn { padding: 6px 10px; font-size: 9px; flex: 1; text-align: center; }

    .detail-panel {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-height: 60vh;
      z-index: 100;
      border-left: none;
      border-top: 2px solid var(--accent-5);
      border-radius: 12px 12px 0 0;
      padding: 12px 16px;
      animation: slideUp 0.25s ease;
      overflow-y: auto;
    }
    .detail-panel.mobile-open { display: block; }
    .mobile-close-btn { display: flex; align-items: center; justify-content: center; }
    .detail-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    .detail-backdrop.visible { display: block; }
  }

  /* Mobile HTML view containers (dependency + timeline) */
  .mobile-view {
    display: none;
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    background: var(--bg);
    padding: 60px 14px 20px;
  }
  .mobile-view.active { display: block; }

  /* Legacy alias */
  .mobile-timeline {
    display: none;
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    background: var(--bg);
    padding: 60px 14px 20px;
  }
  .mt-header {
    text-align: center;
    margin-bottom: 20px;
  }
  .mt-header h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 4px;
  }
  .mt-header .mt-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent-1);
    margin-bottom: 2px;
  }
  .mt-header .mt-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }
  .mt-phase {
    margin-bottom: 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .mt-phase-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--bg-raised);
  }
  .mt-phase-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
  }
  .mt-phase-stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }
  .mt-phase-bar {
    height: 4px;
    background: var(--border);
  }
  .mt-phase-bar-fill {
    height: 100%;
    border-radius: 0 2px 2px 0;
    transition: width 0.3s ease;
  }
  .mt-phase-lessons {
    padding: 6px 12px;
  }
  .mt-lesson {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .mt-lesson:last-child { border-bottom: none; }
  .mt-lesson-num {
    width: 24px;
    text-align: center;
    font-weight: 600;
    font-size: 11px;
    flex-shrink: 0;
  }
  .mt-lesson-title {
    flex: 1;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mt-lesson-hours {
    font-size: 9px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .mt-lesson-status {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Mobile Dependency View */
  .md-phase {
    margin-bottom: 16px;
  }
  .md-phase-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .md-phase-header.collapsed { border-radius: 8px; }
  .md-phase-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
  }
  .md-phase-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .md-phase-progress {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }
  .md-phase-chevron {
    font-size: 12px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }
  .md-phase-header.collapsed .md-phase-chevron { transform: rotate(-90deg); }
  .md-phase-body {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .md-phase-body.collapsed { display: none; }
  .md-lesson-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .md-lesson-card:last-child { border-bottom: none; }
  .md-lesson-card:active { background: var(--bg-hover); }
  .md-status-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 2px solid;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.15s;
    padding: 0;
  }
  .md-status-btn:active { transform: scale(0.9); }
  .md-lesson-info {
    flex: 1;
    min-width: 0;
  }
  .md-lesson-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    margin-right: 6px;
  }
  .md-lesson-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .md-lesson-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 3px;
  }
  .md-lesson-hours {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
  }
  .md-lesson-prereqs {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    opacity: 0.7;
  }
  .md-prereq-met { color: var(--complete); opacity: 1; }
  .md-lesson-chevron {
    color: var(--text-dim);
    font-size: 12px;
    flex-shrink: 0;
    opacity: 0.4;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  /* Calendar styles */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
  }
  .cal-nav {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px;
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .cal-nav:hover { color: var(--text); border-color: var(--border-bright); background: var(--bg-hover); }
  .cal-month-label {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    color: var(--text-bright);
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    padding: 0 20px 20px;
    flex: 1;
    min-height: 0;
  }
  .cal-dow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-align: center;
    padding: 4px 0 8px;
    letter-spacing: 1px;
  }
  .cal-day {
    background: var(--bg-raised);
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 4px;
    min-height: 72px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .cal-day:hover { border-color: var(--border-bright); background: var(--bg-hover); }
  .cal-day.empty { background: transparent; cursor: default; border: none; }
  .cal-day.empty:hover { background: transparent; }
  .cal-day.today { border-color: var(--accent-5); box-shadow: 0 0 0 1px rgba(56,189,248,0.2); }
  .cal-day.selected { border-color: var(--accent-5); background: rgba(56,189,248,0.06); }
  .cal-day-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 3px;
  }
  .cal-day.today .cal-day-num { color: var(--accent-5); }
  .cal-chip {
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 2px 5px;
    margin-bottom: 2px;
    border-radius: 3px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: filter 0.15s;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .cal-chip:hover { filter: brightness(1.3); }
  .cal-chip-num {
    font-weight: 700;
    flex-shrink: 0;
  }
  .cal-chip-title {
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cal-unscheduled {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
  }
  .cal-unscheduled-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .cal-pool-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    margin: 2px 3px;
    border-radius: 4px;
    font-size: 11px;
    cursor: grab;
    transition: all 0.15s;
    border: 1px solid transparent;
    user-select: none;

function loadStatuses() {
  try {
    const saved = JSON.parse(localStorage.getItem(STATUS_KEY));
    if (saved) LESSONS.forEach(l => { if (saved[l.id] !== undefined) l.status = saved[l.id]; });
  } catch(e) {}
}

function saveStatuses() {
  const obj = {};
  LESSONS.forEach(l => obj[l.id] = l.status);
  localStorage.setItem(STATUS_KEY, JSON.stringify(obj));
}

// ── Actual Hours Tracking ──
// Storage format: { lessonId: { hours: number, seeded: boolean } }
function loadActualHours() {
  try {
    const raw = JSON.parse(localStorage.getItem(ACTUAL_HOURS_KEY)) || {};
    // Migrate old format (plain numbers) to new format
    const result = {};
    for (const [k, v] of Object.entries(raw)) {
      if (typeof v === 'number') {
        result[k] = { hours: v, seeded: false };
      } else {
        result[k] = v;
      }
    }
    return result;
  } catch(e) { return {}; }
}
function saveActualHours(data) {
  localStorage.setItem(ACTUAL_HOURS_KEY, JSON.stringify(data));
}

// Helper: get just the hours number for a lesson
function getActualHoursFor(lessonId) {
  const data = loadActualHours();
  return data[lessonId] ? data[lessonId].hours : undefined;
}

// Helper: get total actual hours spent (all lessons, including seeded)
function getTotalActualHours() {
  const data = loadActualHours();
  let total = 0;
  for (const entry of Object.values(data)) {
    total += entry.hours;
  }
  return total;
}

// Helper: compute pace multiplier from NON-SEEDED data only
function computePaceMultiplier() {
  const data = loadActualHours();
  let realActual = 0;
  let realEstimated = 0;
  for (const [id, entry] of Object.entries(data)) {
    if (entry.seeded) continue; // Skip seeded data for pace calculation
    const lesson = LESSONS.find(l => String(l.id) === String(id));
    if (lesson && lesson.status === 'complete') {
      realActual += entry.hours;
      realEstimated += parseHoursGlobal(lesson.hours).avg;
    }
  }
  // Only adjust pace if we have meaningful real data (at least 2 lessons)
  const realCount = Object.values(data).filter(e => !e.seeded).length;
  if (realCount >= 2 && realEstimated > 0 && realActual > 0) {
    return realActual / realEstimated;
  }
  return 1.0; // Default: trust the estimates until we have data
}

// Pre-seed Phase 1 with 28h if not already set
function seedPhase1Hours() {
  const hours = loadActualHours();
  const p1Lessons = LESSONS.filter(l => l.phase === 'p1');
  const alreadySeeded = p1Lessons.some(l => hours[l.id] !== undefined);
  if (alreadySeeded) return;
  // Distribute 28h proportionally to each lesson's estimated average
  let totalAvg = 0;
  p1Lessons.forEach(l => { totalAvg += parseHoursGlobal(l.hours).avg; });
  p1Lessons.forEach(l => {
    const avg = parseHoursGlobal(l.hours).avg;
    hours[l.id] = { hours: Math.round((28 * avg / totalAvg) * 10) / 10, seeded: true };
  });
  saveActualHours(hours);
  // Also mark Phase 1 lessons as complete
  p1Lessons.forEach(l => { l.status = 'complete'; });
  saveStatuses();
}

// ── Hours Modal ──
let _pendingLessonId = null;
let _pendingPrevStatus = null;

function showHoursModal(lessonId) {
  const lesson = LESSONS.find(l => l.id === lessonId);
  const modal = document.getElementById('hours-modal');
  const input = document.getElementById('hours-modal-input');
  document.getElementById('hours-modal-title').textContent = `✓ ${lesson.title}`;
  document.getElementById('hours-modal-subtitle').textContent = 'How many hours did you spend on this lesson?';
  document.getElementById('hours-modal-estimate').textContent = `Estimated: ${lesson.hours}`;
  // Pre-fill with average estimate
  const est = parseHoursGlobal(lesson.hours);
  input.value = est.avg;
  _pendingLessonId = lessonId;
  modal.classList.add('visible');
  setTimeout(() => { input.focus(); input.select(); }, 100);
}

function closeHoursModal(confirmed) {
  const modal = document.getElementById('hours-modal');
  modal.classList.remove('visible');
  if (confirmed && _pendingLessonId !== null) {
    const input = document.getElementById('hours-modal-input');
    let val = parseFloat(input.value);
    if (isNaN(val) || val <= 0) val = parseHoursGlobal(LESSONS.find(l => l.id === _pendingLessonId).hours).avg;
    // Round to nearest 0.5
    val = Math.round(val * 2) / 2;
    const hours = loadActualHours();
    hours[_pendingLessonId] = { hours: val, seeded: false };
    saveActualHours(hours);
    // Record pace completion date
    recordCompletion(_pendingLessonId);
  } else if (!confirmed && _pendingLessonId !== null) {
    // User cancelled — revert status
    const lesson = LESSONS.find(l => l.id === _pendingLessonId);
    if (_pendingPrevStatus !== null) {
      lesson.status = _pendingPrevStatus;
      saveStatuses();
    }
  }
  _pendingLessonId = null;
  _pendingPrevStatus = null;
  refreshAll();
  if (selectedLesson) selectLesson(selectedLesson);
}

// Handle Enter key in modal
document.addEventListener('keydown', function(e) {
  const modal = document.getElementById('hours-modal');
  if (!modal.classList.contains('visible')) return;
  if (e.key === 'Enter') closeHoursModal(true);
  if (e.key === 'Escape') closeHoursModal(false);
});

function cycleStatus(id, ev) {
  if (ev) ev.stopPropagation();
  const lesson = LESSONS.find(l => l.id === id);
  const prevStatus = lesson.status;
  const idx = STATUS_CYCLE.indexOf(lesson.status);
  const nextStatus = STATUS_CYCLE[(idx + 1) % 3];

  // Cycling TO complete → show hours modal
  if (nextStatus === 'complete') {
    _pendingPrevStatus = prevStatus;
    lesson.status = 'complete';
    saveStatuses();
    showHoursModal(id);
    return; // Don't refreshAll yet — modal will do it
  }

  // Cycling FROM complete → remove actual hours
  if (prevStatus === 'complete') {
    const hours = loadActualHours();
    delete hours[id];
    saveActualHours(hours);
    // Also remove pace completion record
    const paceData = loadPaceData();
    delete paceData.completions[id];
    savePaceData(paceData);
  }

  lesson.status = nextStatus;
  saveStatuses();
  refreshAll();
  if (selectedLesson === id) selectLesson(id);
}

function updateStats() {
  const total = LESSONS.length;
  const complete = LESSONS.filter(l => l.status === 'complete').length;
  const inProgress = LESSONS.filter(l => l.status === 'in-progress').length;
  document.getElementById('stat-complete').textContent = complete;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('progress-fill').style.width = `${(complete / total) * 100}%`;

  const actualHours = loadActualHours();

  // Hours done = actual hours spent (real data)
  let done = 0;
  LESSONS.forEach(l => {
    if (l.status === 'complete' && actualHours[l.id] !== undefined) {
      done += actualHours[l.id].hours;
    }
  });

  // Pace multiplier from non-seeded data only
  const paceMultiplier = computePaceMultiplier();

  // Hours remaining = estimates for incomplete lessons, adjusted by pace
  let remaining = 0;
  LESSONS.forEach(l => {
    if (l.status !== 'complete') {
      remaining += parseHoursGlobal(l.hours).avg * paceMultiplier;
    }
  });

  document.getElementById('stat-hours-done').textContent = Math.round(done);
  document.getElementById('stat-hours-left').textContent = Math.round(remaining);
}

function refreshAll() {
  renderSidebar();
  if (currentView === 'dependency') renderGraph();
  else if (currentView === 'timeline') renderTimeline();
  else if (currentView === 'calendar') renderCalendar();
  updateStats();
}

// Helper: properly quote string IDs for onclick handlers

function getPhaseColor(phaseId) {
  const p = PHASES.find(ph => ph.id === phaseId);

}

function getStatusColor(status) {
  if (status === 'complete') return 'var(--complete)';
  if (status === 'in-progress') return 'var(--in-progress)';
  return 'var(--not-started)';
}

function renderSidebar() {

      <span class="chevron" id="chev-${phase.id}">▾</span> ${phase.name.toUpperCase()}
    </div>`;

      html += `<div class="nav-item" id="nav-item-${lesson.id}" onclick="selectLesson(${fmtId(lesson.id)})">
        <div class="status-dot" style="background:${getStatusColor(lesson.status)}" onclick="cycleStatus(${fmtId(lesson.id)}, event)" title="Click to cycle status"></div>

        ${lesson.title}
      </div>`;
    });
    // Checkpoint
    const cp = CHECKPOINTS.find(c => c.phase === phase.id);
    if (cp) {
      html += `<div class="nav-item-checkpoint" onclick="selectCheckpoint('${cp.id}')">✎ ${cp.title}</div>`;
    }
    html += `</div>`;
  });
  sidebar.innerHTML = html;
}

  const section = document.getElementById(`section-${phaseId}`);
  const chev = document.getElementById(`chev-${phaseId}`);
  const hidden = section.style.display === 'none';
  section.style.display = hidden ? '' : 'none';
  chev.classList.toggle('collapsed', !hidden);
}

// ── Dependency Map ──
function renderGraph() {
  const svg = document.getElementById('graph-svg');
  const rect = svg.parentElement.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;

  const scaleX = w / LAYOUT.width;
  const scaleY = h / LAYOUT.height;
  const scale = Math.min(scaleX, scaleY) * 0.88;
  const offsetX = (w - LAYOUT.width * scale) / 2 + 20;
  const offsetY = (h - LAYOUT.height * scale) / 2 + 10;

  function tx(x) { return x * scale + offsetX; }
  function ty(y) { return y * scale + offsetY; }

  let edgesHtml = '';
  let nodesHtml = '';

  LESSONS.forEach(lesson => {
    const to = LAYOUT.nodes[lesson.id];
    lesson.prereqs.forEach(prereqId => {
      const from = LAYOUT.nodes[prereqId];
      edgesHtml += `<line class="edge" id="edge-${prereqId}-${lesson.id}" x1="${tx(from.x)}" y1="${ty(from.y)}" x2="${tx(to.x)}" y2="${ty(to.y)}" />`;
    });
    lesson.crossPhaseLinks.forEach(linkId => {
      const from = LAYOUT.nodes[linkId];
      if (from) {

      <circle class="node-circle" cx="${tx(pos.x)}" cy="${ty(pos.y)}" r="${r}" fill="${color}" fill-opacity="${fillOpacity}" stroke="${statusColor}" />

    { x: 210,  y: -20,  color: '#94a3b8', label: 'P0 TOOLS' },
    { x: 240,  y: 178,  color: '#6ee7b7', label: 'P1 LIN ALG' },
    { x: 470,  y: 50,   color: '#818cf8', label: 'P2 CALC' },
    { x: 700,  y: 30,   color: '#f9a8d4', label: 'P3 PROB' },
    { x: 880,  y: 30,   color: '#fbbf24', label: 'P4 NN' },
    { x: 1080, y: 30,   color: '#e879f9', label: 'P5 MATH' },
    { x: 1280, y: 110,  color: '#c084fc', label: 'P6 ALIGN' },
  ];

  let labelsHtml = '';
  phaseLabels.forEach(pl => {
    labelsHtml += `<text x="${tx(pl.x)}" y="${ty(pl.y)}" fill="${pl.color}" opacity="0.3" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" letter-spacing="1.5" text-anchor="middle">${pl.label}</text>`;
  });

  svg.innerHTML = labelsHtml + edgesHtml + nodesHtml;
}

// ── Select Lesson ──
function selectLesson(id) {
  selectedLesson = id;
  const lesson = LESSONS.find(l => l.id === id);
  if (!lesson) return;

  // Sidebar highlight
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navItem = document.getElementById(`nav-item-${id}`);
  if (navItem) navItem.classList.add('active');

  // Edge highlighting (only in dependency view)
  if (currentView === 'dependency') {
    document.querySelectorAll('.edge').forEach(el => el.classList.remove('highlighted'));
    lesson.prereqs.forEach(pid => {
      const edge = document.getElementById(`edge-${pid}-${id}`);
      if (edge) edge.classList.add('highlighted');
    });
    lesson.crossPhaseLinks.forEach(lid => {
      const edge = document.getElementById(`xedge-${lid}-${id}`);
      if (edge) edge.classList.add('highlighted');
    });
    LESSONS.forEach(other => {
      if (other.prereqs.includes(id)) {
        const edge = document.getElementById(`edge-${id}-${other.id}`);
        if (edge) edge.classList.add('highlighted');
      }
    });
  }

  // Build detail panel
  const phase = PHASES.find(p => p.id === lesson.phase);
  let html = '';

  html += `<div class="detail-header">
    <div class="detail-phase-tag" style="color:${phase.color}">
      <div style="background:${phase.color};width:6px;height:6px;border-radius:50%"></div>
      Phase ${phase.id.replace('p','')} · ${phase.name}
    </div>
    <div class="detail-title">Lesson ${lesson.label || lesson.id}: ${lesson.title}</div>
    <div class="detail-meta">
      <div>⏱ <strong>${lesson.hours}</strong></div>
      <div>Status: <strong style="color:${getStatusColor(lesson.status)};cursor:pointer;border-bottom:1px dashed" onclick="cycleStatus(${fmtId(lesson.id)}, event)" title="Click to change">${lesson.status.replace('-', ' ')}</strong></div>
    </div>
  </div>`;

  // Show actual hours if completed
  const actualHrs = loadActualHours();
  if (lesson.status === 'complete' && actualHrs[lesson.id] !== undefined) {
    html += `<div style="font-size:12px;color:var(--accent-1);font-family:'JetBrains Mono',monospace;margin:6px 0 0 0;padding:0 16px">✓ Completed in ${actualHrs[lesson.id].hours}h (est. ${lesson.hours})</div>`;
  }

  // Prerequisites
  html += `<div class="detail-section"><div class="detail-section-title"><span class="icon">⬆</span> Prerequisites</div>`;
  if (lesson.prereqs.length === 0 && lesson.crossPhaseLinks.length === 0) {
    html += `<p style="font-size:13px;color:var(--text-dim)">None — entry point</p>`;
  } else {
    html += `<ul class="prereq-list">`;
    lesson.prereqs.forEach(pid => {
      const p = LESSONS.find(l => l.id === pid);
      html += `<li><span class="prereq-link" onclick="selectLesson(${fmtId(pid)})">Lesson ${p.label || pid}</span>: ${p.title} <span style="color:${getStatusColor(p.status)};font-size:11px">(${p.status.replace('-',' ')})</span></li>`;
    });
    lesson.crossPhaseLinks.forEach(lid => {
      const l = LESSONS.find(ls => ls.id === lid);
      if (l) {
        html += `<li style="opacity:0.7"><span class="prereq-link" onclick="selectLesson(${fmtId(lid)})">Lesson ${l.label || lid}</span>: ${l.title} <span style="font-size:11px;color:var(--text-dim)">(cross-phase)</span></li>`;
      }
    });
    html += `</ul>`;
  }
  html += `</div>`;

  // MVL
  html += `<div class="detail-section"><div class="detail-section-title"><span class="icon">⚡</span> Minimum Viable Lesson</div>`;
  lesson.mvl.forEach(r => {
    html += `<div class="mvl-resource"><div class="res-type">${r.type}</div>${r.text}</div>`;
  });
  html += `</div>`;

  // Concept checks
  html += `<div class="detail-section"><div class="detail-section-title"><span class="icon">✓</span> Concept Checks</div><ul class="concept-check-list">`;
  lesson.conceptChecks.forEach(q => { html += `<li>${q}</li>`; });
  html += `</ul></div>`;

  // Failure modes
  html += `<div class="detail-section"><div class="detail-section-title"><span class="icon">⚠</span> Common Failure Modes</div><ul class="failure-list">`;
  lesson.failureModes.forEach(f => { html += `<li>${f}</li>`; });
  html += `</ul></div>`;

  // Projects
  if (lesson.projects.length > 0) {
    html += `<div class="detail-section"><div class="detail-section-title"><span class="icon">🔨</span> Coding Projects</div><ul class="project-list">`;
    lesson.projects.forEach(p => {
      const label = p.label || 'Project';
      html += `<li class="project-item"><span class="project-badge ${label.toLowerCase()}">${label}</span><span>${p.text}</span></li>`;
    });
    html += `</ul></div>`;
  }

  document.getElementById('detail-empty').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';
  document.getElementById('detail-content').innerHTML = html;

  // Mobile: show as bottom sheet
  if (window.innerWidth <= 900) {
    document.getElementById('detail-panel').classList.add('mobile-open');
    document.getElementById('detail-backdrop').classList.add('visible');
    document.getElementById('detail-backdrop').classList.add('open');
  }
}

// ── View Switching ──
function setView(view, ev) {
  currentView = view;
  document.querySelectorAll('.canvas-btn').forEach(b => b.classList.remove('active'));
  // Find the correct button even if click target is a child node
  if (ev && ev.target) {
    const btn = ev.target.closest('.canvas-btn');
    if (btn) btn.classList.add('active');
  } else {
    // Fallback: mark the button whose text matches
    document.querySelectorAll('.canvas-btn').forEach(b => {
      if (view === 'dependency' && b.textContent.includes('Dependency')) b.classList.add('active');
      else if (view === 'timeline' && b.textContent.includes('Timeline')) b.classList.add('active');
      else if (view === 'calendar' && b.textContent.includes('Calendar')) b.classList.add('active');
    });
  }

  const svg = document.getElementById('graph-svg');
  const calView = document.getElementById('calendar-view');
  const legend = document.getElementById('canvas-legend');
  const mobileDep = document.getElementById('mobile-dependency');
  const mobileTl = document.getElementById('mobile-timeline');
  const isMobile = window.innerWidth <= 900;

  // Hide everything first
  svg.style.display = 'none';
  calView.style.display = 'none';
  legend.style.display = 'none';
  mobileDep.style.display = 'none';
  mobileTl.style.display = 'none';

  // Reset detail panel when leaving calendar view (don't leave stale day-picker content)
  if (view !== 'calendar') {
    calSelectedDate = null;
    resetDetailPanel();
  }

  if (view === 'dependency') {
    if (isMobile) {
      mobileDep.style.display = 'block';
      renderMobileDependency();
    } else {
      svg.style.display = '';
      legend.style.display = 'flex';
      renderGraph();
    }
  } else if (view === 'timeline') {
    if (isMobile) {
      mobileTl.style.display = 'block';
      renderMobileTimeline();
    } else {
      svg.style.display = '';
      renderTimeline();
    }
  } else if (view === 'calendar') {
    calView.style.display = '';
    renderCalendar();
  }
}

// ── Pace Tracker State ──
const PACE_KEY = 'alignment-curriculum-pace';
const CURRICULUM_START = '2026-02-21'; // First lesson date

// Difficulty weights by phase (relative to Phase 1 baseline)
// Based on: 6-year math gap, strong intuition, rusty mechanics
const DIFFICULTY_WEIGHT = {
  p0cs: 0.7, p0: 0.8, p1: 1.0, p2: 1.3, p3: 1.3,
  p4: 1.4, p5: 1.6, p6: 1.4, p7: 1.0
};

function loadPaceData() {
  try { return JSON.parse(localStorage.getItem(PACE_KEY)) || { completions: {}, startDate: CURRICULUM_START }; }
  catch(e) { return { completions: {}, startDate: CURRICULUM_START }; }
}
function savePaceData(data) { localStorage.setItem(PACE_KEY, JSON.stringify(data)); }

function recordCompletion(lessonId) {
  const data = loadPaceData();
  if (!data.completions[lessonId]) {
    data.completions[lessonId] = new Date().toISOString();
    savePaceData(data);
  }
}

function computePace() {
  const data = loadPaceData();
  const start = new Date(data.startDate);
  const now = new Date();
  const daysSinceStart = Math.max(1, (now - start) / (1000 * 60 * 60 * 24));

  // Sum ACTUAL hours completed (real data from user input)
  const actualHours = loadActualHours();
  let completedContentHours = 0;
  LESSONS.forEach(l => {
    if (l.status === 'complete' && actualHours[l.id] !== undefined) {
      completedContentHours += actualHours[l.id].hours;
    }
  });

  // Pace multiplier from non-seeded data only
  const paceMultiplier = computePaceMultiplier();

  // Your actual pace: real hours per calendar day
  const paceHoursPerDay = completedContentHours / daysSinceStart;

  // Compute pace-adjusted remaining hours
  let weightedRemainLo = 0, weightedRemainHi = 0;
  LESSONS.forEach(l => {
    if (l.status !== 'complete') {
      const hrs = parseHoursGlobal(l.hours);
      const weight = DIFFICULTY_WEIGHT[l.phase] || 1.3;
      weightedRemainLo += hrs.lo * weight * paceMultiplier;
      weightedRemainHi += hrs.hi * weight * paceMultiplier;
    }
  });

  // Estimated days remaining
  const daysRemainLo = paceHoursPerDay > 0 ? Math.round(weightedRemainLo / paceHoursPerDay) : Infinity;
  const daysRemainHi = paceHoursPerDay > 0 ? Math.round(weightedRemainHi / paceHoursPerDay) : Infinity;

  // Projected completion dates
  const projLo = new Date(now.getTime() + daysRemainLo * 24 * 60 * 60 * 1000);
  const projHi = new Date(now.getTime() + daysRemainHi * 24 * 60 * 60 * 1000);

  return {
    daysSinceStart: Math.round(daysSinceStart),
    completedContentHours: Math.round(completedContentHours),
    paceHoursPerDay: paceHoursPerDay.toFixed(1),
    paceMultiplier: paceMultiplier.toFixed(2),
    weightedRemainLo: Math.round(weightedRemainLo),
    weightedRemainHi: Math.round(weightedRemainHi),
    daysRemainLo, daysRemainHi,
    projLo, projHi
  };
}

function parseHoursGlobal(h) {
  const match = String(h).match(/(\d+)–(\d+)/);
  if (match) return { lo: parseInt(match[1]), hi: parseInt(match[2]), avg: (parseInt(match[1]) + parseInt(match[2])) / 2 };
  return { lo: 5, hi: 5, avg: 5 };
}

function formatDate(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

// ── Timeline ──
function renderTimeline() {
  const svg = document.getElementById('graph-svg');
  const rect = svg.parentElement.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;

  function parseHours(h) {
    const match = String(h).match(/(\d+)–(\d+)/);
    if (match) return { lo: parseInt(match[1]), hi: parseInt(match[2]), avg: (parseInt(match[1]) + parseInt(match[2])) / 2 };
    return { lo: 5, hi: 5, avg: 5 };
  }

  // Compute totals using actual hours
  const actualHours = loadActualHours();
  let actualDone = 0;
  LESSONS.forEach(l => {
    if (l.status === 'complete' && actualHours[l.id] !== undefined) {
      actualDone += actualHours[l.id].hours;
    }
  });
  const paceMultiplier = computePaceMultiplier();

  let remainLo = 0, remainHi = 0, inProgLo = 0, inProgHi = 0;
  LESSONS.forEach(l => {
    const hrs = parseHours(l.hours);
    if (l.status === 'in-progress') { inProgLo += hrs.lo; inProgHi += hrs.hi; }
    else if (l.status !== 'complete') { remainLo += hrs.lo; remainHi += hrs.hi; }
  });
  const totalRemainLo = Math.round((remainLo + inProgLo) * paceMultiplier);
  const totalRemainHi = Math.round((remainHi + inProgHi) * paceMultiplier);
  const totalEstimate = Math.round(actualDone + (totalRemainLo + totalRemainHi) / 2);
  const pctDone = totalEstimate > 0 ? Math.round(actualDone / totalEstimate * 100) : 0;

  // Dynamic pace calculation
  const pace = computePace();

  let html = '';
  const cx = w / 2;

  // ── Big summary at top with pace data ──
  if (pace.completedContentHours > 0 && pace.daysRemainLo !== Infinity) {
    html += `<text x="${cx}" y="55" fill="var(--text-bright)" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700" text-anchor="middle">${totalRemainLo}–${totalRemainHi} hours remaining</text>`;
    html += `<text x="${cx}" y="78" fill="var(--accent-1)" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">Est. completion: ${formatDate(pace.projLo)} – ${formatDate(pace.projHi)}</text>`;
    html += `<text x="${cx}" y="98" fill="var(--text-dim)" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">${pace.completedContentHours}h spent · ${pace.paceHoursPerDay}h/day · ${pace.paceMultiplier}× pace vs estimates · ${pctDone}% complete</text>`;
  } else {
    html += `<text x="${cx}" y="55" fill="var(--text-bright)" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700" text-anchor="middle">${totalRemainLo}–${totalRemainHi} hours remaining</text>`;
    html += `<text x="${cx}" y="83" fill="var(--text-dim)" font-family="JetBrains Mono, monospace" font-size="12" text-anchor="middle">${Math.round(actualDone)}h spent · ${pctDone}% of curriculum · Complete lessons to activate pace tracker</text>`;
  }

  // ── Phase breakdown ──
  const margin = { top: 125, left: 60, right: 40 };
  const phaseW = w - margin.left - margin.right;
  const rowH = 48;

  PHASES.filter(p => p.id !== 'p7').forEach((phase, i) => {
    const pLessons = LESSONS.filter(l => l.phase === phase.id);
    const complete = pLessons.filter(l => l.status === 'complete').length;
    const inProg = pLessons.filter(l => l.status === 'in-progress').length;
    const total = pLessons.length;

    // Actual hours spent on this phase
    let pActualDone = 0;
    pLessons.forEach(l => {
      if (l.status === 'complete' && actualHours[l.id] !== undefined) {
        pActualDone += actualHours[l.id].hours;
      }
    });

    // Pace-adjusted remaining for this phase
    let pRemLo = 0, pRemHi = 0;
    pLessons.forEach(l => {
      if (l.status !== 'complete') {
        const hrs = parseHours(l.hours);
        pRemLo += hrs.lo; pRemHi += hrs.hi;
      }
    });
    const pAdjRemLo = Math.round(pRemLo * paceMultiplier);
    const pAdjRemHi = Math.round(pRemHi * paceMultiplier);
    const pPct = total > 0 ? (complete / total) : 0;
    const pPctInProg = total > 0 ? (inProg / total) : 0;

    const y = margin.top + i * rowH;
    const barX = margin.left + 200;
    const barW = phaseW - 200 - 180;
    const barH = 16;
    const barY = y + 6;

    // Phase name with hours spent
    html += `<text x="${margin.left}" y="${y + 18}" fill="${phase.color}" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">${phase.name}</text>`;
    const spentText = pActualDone > 0 ? `${Math.round(pActualDone)}h spent · ` : '';
    html += `<text x="${margin.left}" y="${y + 32}" fill="var(--text-dim)" font-family="JetBrains Mono, monospace" font-size="10">${spentText}${complete}/${total} lessons</text>`;

    // Bar background
    html += `<rect x="${barX}" y="${barY}" width="${barW}" height="${barH}" fill="var(--border)" rx="4" opacity="0.3" />`;
    if (pPct > 0) {
      html += `<rect x="${barX}" y="${barY}" width="${barW * pPct}" height="${barH}" fill="${phase.color}" rx="4" opacity="0.7" />`;
    }
    if (pPctInProg > 0) {
      html += `<rect x="${barX + barW * pPct}" y="${barY}" width="${barW * pPctInProg}" height="${barH}" fill="${phase.color}" rx="4" opacity="0.3" />`;
    }

    // Hours remaining with pace-adjusted estimate
    let hoursText;
    if (pRemLo === 0 && pRemHi === 0) {
      hoursText = `✓ ${Math.round(pActualDone)}h`;
    } else {
      hoursText = `${pAdjRemLo}–${pAdjRemHi}h left`;
    }
    html += `<text x="${barX + barW + 12}" y="${y + 20}" fill="var(--text-dim)" font-family="JetBrains Mono, monospace" font-size="10">${hoursText}</text>`;
  });

  // ── Per-lesson bars at bottom ──
  const bottomY = margin.top + PHASES.filter(p => p.id !== 'p7').length * rowH + 30;
  html += `<text x="${margin.left}" y="${bottomY}" fill="var(--text-dim)" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600">HOURS PER LESSON (colored by phase)</text>`;

  const barAreaTop = bottomY + 15;
  const barAreaH = h - barAreaTop - 40;
  const barW = Math.min(16, (phaseW) / LESSONS.length - 1);
  const gap = (phaseW - barW * LESSONS.length) / LESSONS.length;
  const maxH = Math.max(...LESSONS.map(l => parseHours(l.hours).hi));

  LESSONS.forEach((lesson, i) => {
    const x = margin.left + i * (barW + gap) + gap / 2;
    const hrs = parseHours(lesson.hours);
    const barH = (hrs.avg / maxH) * barAreaH;
    const y = barAreaTop + barAreaH - barH;
    const color = getPhaseColor(lesson.phase);
    const opacity = lesson.status === 'complete' ? 0.8 : lesson.status === 'in-progress' ? 0.5 : 0.2;

    html += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${color}" opacity="${opacity}" rx="2" cursor="pointer" onclick="selectLesson(${typeof lesson.id === 'string' ? '\'' + lesson.id + '\'' : lesson.id})" />`;
    if (barW >= 10) {
      html += `<text x="${x + barW/2}" y="${barAreaTop + barAreaH + 13}" fill="var(--text-dim)" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">${lesson.label || lesson.id}</text>`;
    }
  });

  svg.innerHTML = html;
}

// ── Mobile Dependency View ──
function renderMobileDependency() {
  const container = document.getElementById('mobile-dependency');

  // Track which phases are collapsed
  if (!window._mdCollapsed) window._mdCollapsed = {};

  const completedIds = new Set(LESSONS.filter(l => l.status === 'complete').map(l => l.id));

  let html = '';

  PHASES.filter(p => p.id !== 'p7').forEach(phase => {
    const pLessons = LESSONS.filter(l => l.phase === phase.id);
    const complete = pLessons.filter(l => l.status === 'complete').length;
    const total = pLessons.length;
    const isCollapsed = window._mdCollapsed[phase.id] || false;
    const allDone = complete === total;

    html += `<div class="md-phase">`;
    html += `<div class="md-phase-header${isCollapsed ? ' collapsed' : ''}" onclick="toggleMdPhase('${phase.id}')">
      <span class="md-phase-name" style="color:${phase.color}">${phase.name}</span>
      <div class="md-phase-right">
        <span class="md-phase-progress">${allDone ? '✓' : complete + '/' + total}</span>
        <span class="md-phase-chevron">▼</span>
      </div>
    </div>`;

    html += `<div class="md-phase-body${isCollapsed ? ' collapsed' : ''}">`;
    pLessons.forEach(l => {
      const statusColor = getStatusColor(l.status);
      const statusIcon = l.status === 'complete' ? '✓' : l.status === 'in-progress' ? '◐' : '';
      const statusIconColor = l.status === 'complete' ? '#000' : l.status === 'in-progress' ? '#000' : 'transparent';

      // Check prereqs
      const prereqsMet = l.prereqs.every(p => completedIds.has(p));
      const prereqLabels = l.prereqs.length > 0
        ? l.prereqs.map(p => {
            const pl = LESSONS.find(x => x.id === p);
            return (pl ? (pl.label || pl.id) : p);
          }).join(', ')
        : '';

      html += `<div class="md-lesson-card" onclick="selectLesson(${typeof l.id === 'string' ? '\'' + l.id + '\'' : l.id})">`;

      // Status toggle button
      html += `<button class="md-status-btn" style="border-color:${statusColor};background:${l.status !== 'not-started' ? statusColor : 'transparent'};color:${statusIconColor}" onclick="event.stopPropagation();cycleStatus(${typeof l.id === 'string' ? '\'' + l.id + '\'' : l.id});renderMobileDependency()">${statusIcon}</button>`;

      // Lesson info
      html += `<div class="md-lesson-info">`;
      html += `<span class="md-lesson-name"><span class="md-lesson-num" style="color:${phase.color}">${l.label || l.id}</span>${l.title}</span>`;
      html += `<div class="md-lesson-meta">`;
      html += `<span class="md-lesson-hours">${l.hours}</span>`;
      if (prereqLabels) {
        html += `<span class="md-lesson-prereqs ${prereqsMet ? 'md-prereq-met' : ''}">needs: ${prereqLabels}</span>`;
      }
      html += `</div></div>`;

      html += `<span class="md-lesson-chevron">›</span>`;
      html += `</div>`;
    });
    html += '</div></div>';
  });

  container.innerHTML = html;
}

function toggleMdPhase(phaseId) {
  if (!window._mdCollapsed) window._mdCollapsed = {};
  window._mdCollapsed[phaseId] = !window._mdCollapsed[phaseId];
  renderMobileDependency();
}

// ── Mobile Timeline ──
function renderMobileTimeline() {
  const container = document.getElementById('mobile-timeline');

  function parseHours(h) {
    const match = String(h).match(/(\d+)–(\d+)/);
    if (match) return { lo: parseInt(match[1]), hi: parseInt(match[2]), avg: (parseInt(match[1]) + parseInt(match[2])) / 2 };
    return { lo: 5, hi: 5, avg: 5 };
  }

  // Compute using actual hours
  const actualHours = loadActualHours();
  let actualDone = 0;
  LESSONS.forEach(l => {
    if (l.status === 'complete' && actualHours[l.id] !== undefined) {
      actualDone += actualHours[l.id].hours;
    }
  });
  const paceMultiplier = computePaceMultiplier();

  let remainLo = 0, remainHi = 0;
  LESSONS.forEach(l => {
    if (l.status !== 'complete') {
      const hrs = parseHours(l.hours);
      remainLo += hrs.lo; remainHi += hrs.hi;
    }
  });
  const adjRemLo = Math.round(remainLo * paceMultiplier);
  const adjRemHi = Math.round(remainHi * paceMultiplier);
  const totalEstimate = Math.round(actualDone + (adjRemLo + adjRemHi) / 2);
  const pctDone = totalEstimate > 0 ? Math.round(actualDone / totalEstimate * 100) : 0;
  const pace = computePace();

  let html = '<div class="mt-header">';
  if (pace.completedContentHours > 0 && pace.daysRemainLo !== Infinity) {
    html += `<h2>${adjRemLo}–${adjRemHi}h left</h2>`;
    html += `<div class="mt-subtitle">Est. ${formatDate(pace.projLo)} – ${formatDate(pace.projHi)}</div>`;
    html += `<div class="mt-meta">${pace.completedContentHours}h spent · ${pace.paceHoursPerDay}h/day · ${pctDone}%</div>`;
  } else {
    html += `<h2>${adjRemLo}–${adjRemHi}h remaining</h2>`;
    html += `<div class="mt-meta">${Math.round(actualDone)}h spent · ${pctDone}% complete</div>`;
  }
  html += '</div>';

  PHASES.filter(p => p.id !== 'p7').forEach(phase => {
    const pLessons = LESSONS.filter(l => l.phase === phase.id);
    const complete = pLessons.filter(l => l.status === 'complete').length;
    const total = pLessons.length;
    const pPct = total > 0 ? (complete / total) : 0;

    let pActualDone = 0;
    pLessons.forEach(l => {
      if (l.status === 'complete' && actualHours[l.id] !== undefined) pActualDone += actualHours[l.id].hours;
    });

    let pRemLo = 0, pRemHi = 0;
    pLessons.forEach(l => {
      if (l.status !== 'complete') {
        const hrs = parseHours(l.hours);
        pRemLo += Math.round(hrs.lo * paceMultiplier);
        pRemHi += Math.round(hrs.hi * paceMultiplier);
      }
    });
    const hoursText = pRemLo === 0 ? `✓ ${Math.round(pActualDone)}h` : `${pRemLo}–${pRemHi}h`;

    html += `<div class="mt-phase">`;
    html += `<div class="mt-phase-header">
      <span class="mt-phase-name" style="color:${phase.color}">${phase.name}</span>
      <span class="mt-phase-stats">${complete}/${total} · ${hoursText}</span>
    </div>`;
    html += `<div class="mt-phase-bar"><div class="mt-phase-bar-fill" style="width:${pPct * 100}%;background:${phase.color};opacity:0.7"></div></div>`;
    html += `<div class="mt-phase-lessons">`;
    pLessons.forEach(l => {
      const statusColor = getStatusColor(l.status);
      const lActual = actualHours[l.id];
      const hoursDisplay = (l.status === 'complete' && lActual !== undefined) ? `${lActual.hours}h actual` : l.hours;
      html += `<div class="mt-lesson" onclick="selectLesson(${typeof l.id === 'string' ? '\'' + l.id + '\'' : l.id})">
        <span class="mt-lesson-status" style="background:${statusColor}"></span>
        <span class="mt-lesson-num" style="color:${phase.color}">${l.label || l.id}</span>
        <span class="mt-lesson-title">${l.title}</span>
        <span class="mt-lesson-hours">${hoursDisplay}</span>
      </div>`;
    });
    html += '</div></div>';
  });

  container.innerHTML = html;
}

// ── Calendar ──
function renderCalendar() {
  const container = document.getElementById('calendar-view');
  const cal = loadCalendar();
  const today = new Date();
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const firstDow = new Date(calYear, calMonth, 1).getDay(); // 0=Sun

  let html = '';

  // Header with nav
  html += `<div class="cal-header">
    <div>
      <span class="cal-month-label">${monthNames[calMonth]} ${calYear}</span>
      <button onclick="calToday()" style="background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;border-radius:3px;cursor:pointer;margin-left:10px;vertical-align:middle">today</button>
    </div>
    <div style="display:flex;gap:4px">
      <button class="cal-nav" onclick="calPrev()">&larr;</button>
      <button class="cal-nav" onclick="calNext()">&rarr;</button>
    </div>
  </div>`;

  // Day-of-week headers
  html += `<div class="cal-grid">`;
  ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach(d => {
    html += `<div class="cal-dow">${d}</div>`;
  });

  // Empty cells before month start
  for (let i = 0; i < firstDow; i++) {
    html += `<div class="cal-day empty"></div>`;
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const dk = dateKey(calYear, calMonth, d);
    const isToday = dk === todayKey;
    const isSelected = dk === calSelectedDate;
    const dayLessons = (cal[dk] || []).map(id => findItem(id)).filter(Boolean);

    let classes = 'cal-day';
    if (isToday) classes += ' today';
    if (isSelected) classes += ' selected';

    html += `<div class="${classes}" onclick="calSelectDay('${dk}')" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="calDrop(event,'${dk}')">`;
    html += `<div class="cal-day-num">${d}</div>`;

    dayLessons.forEach(lesson => {
      const color = lesson.repeatable ? lesson.color : getPhaseColor(lesson.phase);
      html += `<div class="cal-chip" style="background:${color}22;color:${color}" onclick="event.stopPropagation();${lesson.repeatable ? '' : `calChipClick(${fmtId(lesson.id)},'${dk}')`}" title="${lesson.title} — right-click to remove" oncontextmenu="event.preventDefault();event.stopPropagation();calRemoveLesson(${fmtId(lesson.id)},'${dk}')">`;
      html += `<span class="cal-chip-num">${lesson.label || lesson.id}</span>`;
      html += `<span class="cal-chip-title">${lesson.title}</span>`;
      html += `</div>`;
    });

    html += `</div>`;
  }

  // Empty cells after month end
  const totalCells = firstDow + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 0; i < remaining; i++) {
    html += `<div class="cal-day empty"></div>`;
  }

  html += `</div>`;

  // Lesson pool - always shows all lessons
  const dayCounts = getScheduledDayCounts();
  const unplacedCount = LESSONS.filter(l => !dayCounts[l.id]).length;
  html += `<div class="cal-unscheduled">`;
  html += `<div class="cal-unscheduled-label">LESSON POOL (${unplacedCount} unplaced) — drag onto calendar or select a day and click</div>`;
  html += `<div style="display:flex;flex-wrap:wrap;gap:0">`;

  LESSONS.forEach(lesson => {
    const color = getPhaseColor(lesson.phase);
    const statusIcon = lesson.status === 'complete' ? '●' : lesson.status === 'in-progress' ? '◐' : '○';
    const days = dayCounts[lesson.id] || 0;
    const dimmed = days > 0 ? 'opacity:0.55;' : '';
    html += `<div class="cal-pool-chip" style="background:${color}15;color:${color};${dimmed}" draggable="true" ondragstart="calDragStart(event,${fmtId(lesson.id)})" onclick="calPoolClick(${fmtId(lesson.id)})" title="${lesson.title} (${lesson.hours})${days ? ' — scheduled on ' + days + ' day' + (days>1?'s':'') : ''}">`;
    html += `<span style="font-size:9px">${statusIcon}</span>`;
    html += `<span style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700">${lesson.label || lesson.id}</span>`;
    html += `<span style="font-family:'DM Sans',sans-serif;font-size:11px">${lesson.title}</span>`;
    if (days > 0) html += `<span style="font-family:'JetBrains Mono',monospace;font-size:9px;opacity:0.7;margin-left:2px">${days}d</span>`;
    html += `</div>`;
  });

  html += `</div></div>`;

  // Review activities pool — always visible, infinitely placeable
  html += `<div class="cal-unscheduled" style="margin-top:0;border-top:1px solid var(--border)">`;
  html += `<div class="cal-unscheduled-label">REVIEW ACTIVITIES — place as many times as you want</div>`;
  html += `<div style="display:flex;flex-wrap:wrap;gap:0">`;

  // Review Intuition Notebook
  const riColor = '#a78bfa';
  html += `<div class="cal-pool-chip" style="background:${riColor}15;color:${riColor}" draggable="true" ondragstart="calDragStart(event,'review-intuition')" onclick="calPoolClick('review-intuition')" title="Review your Intuition Notebook — placeable on any number of days">`;
  html += `<span style="font-size:11px">📓</span>`;
  html += `<span style="font-family:'DM Sans',sans-serif;font-size:11px">Review Intuition Notebook</span>`;
  html += `</div>`;

  // Review Problems: Phase X
  const rpColor = '#f59e0b';
  html += `<div class="cal-pool-chip" style="background:${rpColor}15;color:${rpColor}" draggable="true" ondragstart="calDragStartReviewProblems(event)" onclick="calPoolClickReviewProblems()" title="Review problems for a specific phase — you'll pick which phase">`;
  html += `<span style="font-size:11px">📝</span>`;
  html += `<span style="font-family:'DM Sans',sans-serif;font-size:11px">Review Problems: Phase X</span>`;
  html += `</div>`;

  html += `</div></div>`;

  container.innerHTML = html;
}

function calPrev() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}
function calNext() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}
function calToday() {
  const t = new Date();
  calYear = t.getFullYear();
  calMonth = t.getMonth();
  renderCalendar();
}

function calSelectDay(dk) {
  calSelectedDate = (calSelectedDate === dk) ? null : dk;
  renderCalendar();

  if (calSelectedDate) {
    // Show picker in detail panel
    showDayPicker(dk);
  }
}

function showDayPicker(dk) {
  const cal = loadCalendar();
  const dayLessonIds = cal[dk] || [];
  const dayItems = dayLessonIds.map(id => findItem(id)).filter(Boolean);
  const available = LESSONS.filter(l => !dayLessonIds.includes(l.id));
  const dayCounts = getScheduledDayCounts();

  const parts = dk.split('-');
  const dateStr = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]))
    .toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  let html = `<div class="detail-header">
    <div class="detail-phase-tag" style="color:var(--accent-5)">
      <div style="background:var(--accent-5);width:6px;height:6px;border-radius:50%"></div>
      Calendar
    </div>
    <div class="detail-title">${dateStr}</div>
  </div>`;

  // Scheduled for this day
  if (dayItems.length > 0) {
    html += `<div class="detail-section"><div class="detail-section-title"><span class="icon">📅</span> Scheduled</div>`;
    dayItems.forEach(lesson => {
      const color = lesson.repeatable ? lesson.color : getPhaseColor(lesson.phase);
      const otherDays = (dayCounts[lesson.id] || 1) - 1;
      const otherNote = otherDays > 0 ? ` <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim)">+${otherDays} other day${otherDays>1?'s':''}</span>` : '';
      html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0">
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${color}">${lesson.label || lesson.id}</span>
        <span style="font-size:12px;flex:1;${lesson.repeatable ? '' : `cursor:pointer" onclick="selectLesson(${fmtId(lesson.id)})`}">${lesson.title}${otherNote}</span>
        ${lesson.hours ? `<span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim)">${lesson.hours}</span>` : ''}
        <button onclick="calRemoveLesson(${fmtId(lesson.id)},'${dk}')" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:2px 4px" title="Remove from this day">✕</button>
      </div>`;
    });
    html += `</div>`;
  }

  // Add lessons (not already on this day)
  if (available.length > 0) {
    html += `<div class="detail-section"><div class="detail-section-title"><span class="icon">➕</span> Add a Lesson</div>`;

    // Group by phase
    PHASES.forEach(phase => {
      const phaseLessons = available.filter(l => l.phase === phase.id);
      if (phaseLessons.length === 0) return;
      html += `<div style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:${phase.color};letter-spacing:1px;padding:6px 0 2px;opacity:0.6">${phase.name.toUpperCase()}</div>`;
      phaseLessons.forEach(lesson => {
        const color = getPhaseColor(lesson.phase);
        const days = dayCounts[lesson.id] || 0;
        const daysBadge = days > 0 ? `<span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);margin-left:4px">${days}d</span>` : '';
        html += `<div class="picker-lesson" onclick="calAddLesson(${fmtId(lesson.id)},'${dk}')">
          <span class="picker-lesson-num" style="color:${color}">${lesson.label || lesson.id}</span>
          <span>${lesson.title}${daysBadge}</span>
          <span class="picker-hours">${lesson.hours}</span>
        </div>`;
      });
    });
    html += `</div>`;
  }

  // Review activities section in day picker
  html += `<div class="detail-section"><div class="detail-section-title"><span class="icon">🔁</span> Review Activities</div>`;

  // Review Intuition Notebook
  if (!dayLessonIds.includes('review-intuition')) {
    html += `<div class="picker-lesson" onclick="calAddLesson('review-intuition','${dk}')">
      <span class="picker-lesson-num" style="color:#a78bfa">📓</span>
      <span>Review Intuition Notebook</span>
      <span class="picker-hours"></span>
    </div>`;
  }

  // Review Problems — one entry per phase not already on this day
  PHASES.forEach(phase => {
    const rpId = `review-problems-${phase.id}`;
    if (dayLessonIds.includes(rpId)) return;
    html += `<div class="picker-lesson" onclick="calAddLesson('${rpId}','${dk}')">
      <span class="picker-lesson-num" style="color:${phase.color}">📝</span>
      <span>Review Problems: ${phase.name}</span>
      <span class="picker-hours"></span>
    </div>`;
  });

  html += `</div>`;

  document.getElementById('detail-empty').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';
  document.getElementById('detail-content').innerHTML = html;

  if (window.innerWidth <= 900) {
    document.getElementById('detail-panel').classList.add('mobile-open');
    document.getElementById('detail-backdrop').classList.add('open');
  }
}

function calAddLesson(lessonId, dk) {
  const cal = loadCalendar();
  if (!cal[dk]) cal[dk] = [];
  if (!cal[dk].includes(lessonId)) {
    cal[dk].push(lessonId);
    saveCalendar(cal);
  }
  renderCalendar();
  showDayPicker(dk);
}

function calRemoveLesson(lessonId, dk) {
  const cal = loadCalendar();
  if (cal[dk]) {
    cal[dk] = cal[dk].filter(id => id !== lessonId);
    if (cal[dk].length === 0) delete cal[dk];
    saveCalendar(cal);
  }
  renderCalendar();
  if (calSelectedDate === dk) showDayPicker(dk);
}

function calChipClick(lessonId, dk) {
  selectLesson(lessonId);
}

function calPoolClick(lessonId) {
  if (calSelectedDate) {
    calAddLesson(lessonId, calSelectedDate);
  } else if (!isReviewItem(lessonId)) {
    selectLesson(lessonId);
  }
}

// Drag and drop
function calDragStart(ev, lessonId) {
  calDragLesson = lessonId;
  ev.dataTransfer.effectAllowed = 'move';
  ev.target.classList.add('dragging');
  setTimeout(() => { if (ev.target) ev.target.classList.remove('dragging'); }, 200);
}

function calDrop(ev, dk) {
  ev.preventDefault();
  ev.target.closest('.cal-day')?.classList.remove('drag-over');
  if (calDragLesson !== null) {
    if (calDragLesson === '__review-problems-pick__') {
      // Dropping "Review Problems" — prompt for phase
      calDragLesson = null;
      showPhasePicker(dk);
      return;
    }
    const cal = loadCalendar();
    // Add to this day (don't remove from other days — lessons can span multiple days)
    if (!cal[dk]) cal[dk] = [];
    if (!cal[dk].includes(calDragLesson)) cal[dk].push(calDragLesson);
    saveCalendar(cal);
    calDragLesson = null;
    renderCalendar();
    if (calSelectedDate === dk) showDayPicker(dk);
  }
}

// ── Review Problems phase picker ──

function calDragStartReviewProblems(ev) {
  calDragLesson = '__review-problems-pick__';
  ev.dataTransfer.effectAllowed = 'move';
}

function calPoolClickReviewProblems() {
  if (calSelectedDate) {
    showPhasePicker(calSelectedDate);
  }
}

function showPhasePicker(dk) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  let inner = `<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:20px;max-width:360px;width:90%">`;
  inner += `<div style="font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text)">Which phase to review?</div>`;
  inner += `<div style="display:flex;flex-direction:column;gap:4px">`;

  PHASES.forEach(phase => {
    inner += `<button class="phase-pick-btn" data-phase="${phase.id}" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:${phase.color}12;border:1px solid ${phase.color}33;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;color:${phase.color};text-align:left">`;
    inner += `<span style="width:8px;height:8px;border-radius:50%;background:${phase.color};flex-shrink:0"></span>`;
    inner += `<span>${phase.name}</span>`;
    inner += `</button>`;
  });

  inner += `</div></div>`;

  const box = document.createElement('div');
  box.innerHTML = inner;
  overlay.appendChild(box.firstChild);
  document.body.appendChild(overlay);

  overlay.querySelectorAll('.phase-pick-btn').forEach(btn => {
    btn.onmouseenter = () => { btn.style.filter = 'brightness(1.3)'; };
    btn.onmouseleave = () => { btn.style.filter = ''; };
    btn.onclick = () => {
      const phaseId = btn.dataset.phase;
      const reviewId = `review-problems-${phaseId}`;
      const cal = loadCalendar();
      if (!cal[dk]) cal[dk] = [];
      if (!cal[dk].includes(reviewId)) cal[dk].push(reviewId);
      saveCalendar(cal);
      overlay.remove();
      renderCalendar();
      if (calSelectedDate === dk) showDayPicker(dk);
    };
  });
}


// ═══════════════════════════════════════════════
// PUSH / PULL — GitHub sync (README + calendar)
// ═══════════════════════════════════════════════

const GH_REPO = 'Kaxitron/research_plan';
const GH_README_PATH = 'README.md';
const GH_CALENDAR_PATH = 'calendar-data.json';
const GH_TOKEN_KEY = 'alignment-curriculum-gh-token';

function getGhToken() {
  let token = localStorage.getItem(GH_TOKEN_KEY);
  if (!token) {
    token = prompt('Enter your GitHub Personal Access Token (stored locally in your browser):');
    if (token) localStorage.setItem(GH_TOKEN_KEY, token.trim());
  }
  return token ? token.trim() : null;
}

function setBtnState(id, state, icon) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.classList.remove('syncing','success','error');
  if (state) btn.classList.add(state);
  btn.style.pointerEvents = (state === 'syncing') ? 'none' : '';
  const iconEl = btn.querySelector('span');
  if (iconEl) iconEl.textContent = icon;
}

// ── PUSH ──────────────────────────────────────
let _pushInProgress = false;
async function pushToGithub() {
  if (_pushInProgress) return;
  _pushInProgress = true;
  setBtnState('push-btn', 'syncing', '⟳');

  try {
    const token = getGhToken();
    if (!token) { _pushInProgress = false; setBtnState('push-btn', null, '⬆'); return; }
    const headers = { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' };

    // ── 1. Update README lesson statuses ──
    const getResp = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_README_PATH}`, { headers });
    if (!getResp.ok) throw new Error(`README GET failed: ${getResp.status}`);
    const fileData = await getResp.json();
    let content = new TextDecoder().decode(Uint8Array.from(atob(fileData.content.replace(/\n/g, '')), c => c.charCodeAt(0)));

    // Build status map — handles both numeric IDs (1,2,3...) and CS-prefix IDs (cs01,cs02...)
    const statusMap = {};
    LESSONS.forEach(l => {
      const emoji = l.status === 'complete' ? '✅ Complete' :
                    l.status === 'in-progress' ? '🔄 In Progress' : '⬜ Not Started';
      statusMap[String(l.id)] = emoji;
    });

    // Replace status column in all table rows — matches both numeric and CS-prefix IDs
    content = content.replace(
      /^\| ([\w-]+) \| (.+?) \| (.+?) \|$/gm,
      (match, id, lessonCol, statusCol) => {
        const key = String(id).trim();
        if (statusMap.hasOwnProperty(key)) {
          return `| ${id} | ${lessonCol} | ${statusMap[key]} |`;
        }
        return match;
      }
    );

    const encodedReadme = btoa(unescape(encodeURIComponent(content)));
    let putResp = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_README_PATH}`, {
      method: 'PUT', headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Push lesson progress from dashboard', content: encodedReadme, sha: fileData.sha })
    });
    if (putResp.status === 409) {
      const retry = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_README_PATH}`, { headers });
      const retryData = await retry.json();
      putResp = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_README_PATH}`, {
        method: 'PUT', headers: { ...headers, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: 'Push lesson progress from dashboard', content: encodedReadme, sha: retryData.sha })
      });
    }
    if (!putResp.ok) { const e = await putResp.json(); throw new Error(e.message || `README PUT failed: ${putResp.status}`); }

    // ── 2. Push calendar data ──
    const calendarData = loadCalendar();
    const calJson = JSON.stringify(calendarData, null, 2);
    const encodedCal = btoa(unescape(encodeURIComponent(calJson)));

    // Try to get existing SHA for calendar file (may not exist yet)
    const calGet = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_CALENDAR_PATH}`, { headers });
    const calPutBody = { message: 'Push calendar data from dashboard', content: encodedCal };
    if (calGet.ok) { const calData = await calGet.json(); calPutBody.sha = calData.sha; }

    const calPut = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_CALENDAR_PATH}`, {
      method: 'PUT', headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify(calPutBody)
    });
    if (!calPut.ok) { const e = await calPut.json(); throw new Error(e.message || `Calendar PUT failed: ${calPut.status}`); }

    setBtnState('push-btn', 'success', '✓');
    setTimeout(() => setBtnState('push-btn', null, '⬆'), 3000);

  } catch(e) {
    console.error('Push failed:', e);
    setBtnState('push-btn', 'error', '✗');
    if (e.message.includes('401') || e.message.includes('403')) {
      localStorage.removeItem(GH_TOKEN_KEY);
      alert('Auth failed — token cleared. Try again.');
    } else {
      alert(`Push failed: ${e.message}`);
    }
    setTimeout(() => setBtnState('push-btn', null, '⬆'), 3000);
  } finally {
    _pushInProgress = false;
    const btn = document.getElementById('push-btn');
    if (btn) btn.style.pointerEvents = '';
  }
}

// ── PULL ──────────────────────────────────────
let _pullInProgress = false;
async function pullFromGithub() {
  if (_pullInProgress) return;
  _pullInProgress = true;
  setBtnState('pull-btn', 'syncing', '⟳');

  try {
    const token = getGhToken();
    if (!token) { _pullInProgress = false; setBtnState('pull-btn', null, '⬇'); return; }
    const headers = { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' };

    // ── 1. Pull README lesson statuses ──
    const getResp = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_README_PATH}`, { headers });
    if (!getResp.ok) throw new Error(`README GET failed: ${getResp.status}`);
    const fileData = await getResp.json();
    const content = new TextDecoder().decode(Uint8Array.from(atob(fileData.content.replace(/\n/g, '')), c => c.charCodeAt(0)));

    // Parse status from README table rows — handles both numeric and CS-prefix IDs
    const statusMap = {};
    const rowRegex = /^\| ([\w-]+) \| .+? \| (✅ Complete|🔄 In Progress|⬜ Not Started) \|$/gm;
    let m;
    while ((m = rowRegex.exec(content)) !== null) {
      const id = m[1].trim();
      const emoji = m[2];
      const status = emoji === '✅ Complete' ? 'complete' :
                     emoji === '🔄 In Progress' ? 'in-progress' : 'not-started';
      statusMap[id] = status;
    }

    // Apply to LESSONS — match by string ID
    LESSONS.forEach(l => {
      const key = String(l.id);
      if (statusMap.hasOwnProperty(key)) l.status = statusMap[key];
    });
    saveStatuses();

    // ── 2. Pull calendar data ──
    const calGet = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_CALENDAR_PATH}`, { headers });
    if (calGet.ok) {
      const calData = await calGet.json();
      const calJson = new TextDecoder().decode(Uint8Array.from(atob(calData.content.replace(/\n/g, '')), c => c.charCodeAt(0)));
      try {
        const parsed = JSON.parse(calJson);
        saveCalendar(parsed);
      } catch(e) { console.warn('Calendar JSON parse failed:', e); }
    }

    // Refresh all views
    refreshAll();
    if (selectedLesson !== null) selectLesson(selectedLesson);

    setBtnState('pull-btn', 'success', '✓');
    setTimeout(() => setBtnState('pull-btn', null, '⬇'), 3000);

  } catch(e) {
    console.error('Pull failed:', e);
    setBtnState('pull-btn', 'error', '✗');
    if (e.message.includes('401') || e.message.includes('403')) {
      localStorage.removeItem(GH_TOKEN_KEY);
      alert('Auth failed — token cleared. Try again.');
    } else {
      alert(`Pull failed: ${e.message}`);
    }
    setTimeout(() => setBtnState('pull-btn', null, '⬇'), 3000);
  } finally {
    _pullInProgress = false;
    const btn = document.getElementById('pull-btn');
    if (btn) btn.style.pointerEvents = '';
  }
}

function refreshCurrentView() {
  const svg = document.getElementById('graph-svg');
  const calView = document.getElementById('calendar-view');
  const legend = document.getElementById('canvas-legend');
  const mobileDep = document.getElementById('mobile-dependency');
  const mobileTl = document.getElementById('mobile-timeline');
  const isMobile = window.innerWidth <= 900;

  svg.style.display = 'none';
  calView.style.display = 'none';
  legend.style.display = 'none';
  mobileDep.style.display = 'none';
  mobileTl.style.display = 'none';

  if (currentView === 'dependency') {
    if (isMobile) { mobileDep.style.display = 'block'; renderMobileDependency(); }
    else { svg.style.display = ''; legend.style.display = 'flex'; renderGraph(); }
  } else if (currentView === 'timeline') {
    if (isMobile) { mobileTl.style.display = 'block'; renderMobileTimeline(); }
    else { svg.style.display = ''; renderTimeline(); }
  } else if (currentView === 'calendar') {
    calView.style.display = '';
    renderCalendar();
  }
}

function init() {
  loadStatuses();
  seedPhase1Hours();
  renderSidebar();
  window.addEventListener('resize', () => {
    // Re-trigger current view on resize to handle mobile <-> desktop transitions
    const fakeEvent = { target: document.querySelector('.canvas-btn.active') };
    const savedView = currentView;
    // Use a small helper instead of setView to avoid event.target issues
    refreshCurrentView();
  });
}

init();
